<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快速添加今日排班</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #2a2a40;
        }
        h1 { color: #fff; margin-bottom: 30px; }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #b0b0c0;
            font-size: 14px;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #3a3a50;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #4caf50, #45a049);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        .btn:hover { opacity: 0.9; }
        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }
        .message.success {
            background: rgba(76, 175, 80, 0.2);
            color: #81c784;
            border: 1px solid #4caf50;
        }
        .message.error {
            background: rgba(255, 107, 107, 0.2);
            color: #ff8a80;
            border: 1px solid #ff6b6b;
        }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: linear-gradient(90deg, #9e9e9e, #757575);
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
        .info {
            background: rgba(108, 99, 255, 0.1);
            border: 1px solid rgba(108, 99, 255, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #8c92ac;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>➕ 添加今日排班</h1>
        
        <div class="info">
            📅 今天日期：<strong id="todayDate" style="color: #6c63ff;"></strong>
        </div>

        <div class="input-group">
            <label>值班时段</label>
            <select id="shiftSelect">
                <option value="">-- 请选择值班时段 --</option>
                <option value="04:00-06:00">04:00-06:00</option>
                <option value="06:00-08:00">06:00-08:00</option>
                <option value="08:00-09:30">08:00-09:30</option>
                <option value="09:30-11:00">09:30-11:00</option>
                <option value="11:00-12:30">11:00-12:30</option>
                <option value="12:30-14:00">12:30-14:00</option>
                <option value="14:00-15:30">14:00-15:30</option>
                <option value="15:30-17:00">15:30-17:00</option>
                <option value="17:00-18:30">17:00-18:30</option>
                <option value="18:30-20:00">18:30-20:00</option>
                <option value="20:00-21:30">20:00-21:30</option>
                <option value="21:30-23:00">21:30-23:00</option>
                <option value="23:00-24:00">23:00-24:00</option>
                <option value="24:00-04:00">🌙 24:00-04:00 (夜班)</option>
            </select>
        </div>

        <div class="input-group">
            <label>值班人员姓名</label>
            <input type="text" id="nameInput" placeholder="请输入值班人员姓名">
        </div>

        <button onclick="addShift()" class="btn">✅ 添加排班</button>

        <div id="message" class="message"></div>

        <a href="/" class="back-btn">← 返回首页</a>
        <a href="/admin.html" class="back-btn">排班管理</a>
    </div>

    <script>
        const today = new Date();
        const pad = (n) => String(n).padStart(2, '0');
        const todayStr = `${today.getFullYear()}-${pad(today.getMonth() + 1)}-${pad(today.getDate())}`;
        
        document.getElementById('todayDate').innerText = todayStr;

        function showMessage(text, type) {
            const msgEl = document.getElementById('message');
            msgEl.innerText = text;
            msgEl.className = 'message ' + type;
            msgEl.style.display = 'block';
            setTimeout(() => msgEl.style.display = 'none', 3000);
        }

        async function addShift() {
            const shift = document.getElementById('shiftSelect').value;
            const name = document.getElementById('nameInput').value.trim();
            
            if (!shift) {
                showMessage('⚠️ 请选择值班时段', 'error');
                return;
            }
            if (!name) {
                showMessage('⚠️ 请输入姓名', 'error');
                return;
            }

            try {
                const response = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        date: todayStr, 
                        config: [{ 
                            duty_date: todayStr, 
                            duty_time: shift, 
                            name: name 
                        }] 
                    })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showMessage('✅ 添加成功！你可以去首页打卡了', 'success');
                    document.getElementById('nameInput').value = '';
                } else {
                    showMessage('❌ 添加失败：' + result.error, 'error');
                }
            } catch (error) {
                console.error('添加失败:', error);
                showMessage('❌ 网络请求失败', 'error');
            }
        }
    </script>
</body>
</html>
