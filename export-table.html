<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>值班表预览 - 值班打卡系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fa;
            color: #606266;
            padding: 20px;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            color: #303133;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-back {
            background: #fff;
            border: 1px solid #dcdfe6;
            color: #606266;
        }

        .btn-back:hover {
            background: #f5f7fa;
        }

        .btn-export-csv {
            background: #67c23a;
            color: white;
        }

        .btn-export-csv:hover {
            background: #85ce61;
        }

        .btn-export-excel {
            background: #409eff;
            color: white;
        }

        .btn-export-excel:hover {
            background: #66b1ff;
        }

        /* Sheet 切换 */
        .sheet-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 0;
            border-bottom: 2px solid #dcdfe6;
        }

        .sheet-tab {
            padding: 10px 20px;
            background: #f5f7fa;
            border: 1px solid #dcdfe6;
            border-bottom: none;
            border-radius: 4px 4px 0 0;
            cursor: pointer;
            font-size: 13px;
            color: #606266;
            transition: all 0.2s;
            margin-right: 2px;
        }

        .sheet-tab:hover {
            background: #ecf5ff;
            border-color: #c6e2ff;
        }

        .sheet-tab.active {
            background: #fff;
            border-color: #dcdfe6;
            border-bottom: 2px solid #fff;
            margin-bottom: -2px;
            color: #409eff;
            font-weight: 600;
        }

        /* 筛选区域 */
        .filter-section {
            background: #fff;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #dcdfe6;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-group label {
            font-size: 13px;
            color: #606266;
        }

        .filter-group input, .filter-group select {
            padding: 6px 10px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            font-size: 12px;
        }

        .search-input {
            width: 200px !important;
        }

        .btn-apply {
            background: #409eff;
            color: white;
            padding: 6px 15px;
        }

        .btn-apply:hover {
            background: #66b1ff;
        }

        .btn-clear {
            background: #909399;
            color: white;
            padding: 6px 15px;
        }

        .btn-clear:hover {
            background: #a6a9ad;
        }

        /* 表格区域 */
        .table-container {
            background: #fff;
            border-radius: 4px;
            border: 1px solid #dcdfe6;
            overflow: auto;
            max-height: 70vh;
        }

        .duty-table {
            width: max-content;
            border-collapse: collapse;
            font-size: 12px;
        }

        .duty-table th, .duty-table td {
            border: 1px solid #dcdfe6;
            padding: 8px 6px;
            text-align: center;
            min-width: 35px;
        }

        .duty-table th {
            background: #f5f7fa;
            color: #606266;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .duty-table th:first-child {
            left: 0;
            z-index: 20;
            min-width: 35px;
        }

        .duty-table td:first-child {
            left: 0;
            position: sticky;
            z-index: 15;
            background: #fff;
            font-weight: 500;
            text-align: left;
            min-width: 80px;
            cursor: pointer;
        }

        .duty-table td:first-child:hover {
            background: #ecf5ff;
        }

        .duty-table th:first-child {
            background: #f5f7fa;
            z-index: 30;
        }

        /* 第一列冻结 */
        .duty-table td:first-child,
        .duty-table th:first-child {
            border-right: 2px solid #dcdfe6;
        }

        /* 值班单元格 */
        .duty-table td.value-1 {
            background: #e6f7ff;
            color: #1890ff;
            font-weight: 600;
        }

        /* 统计列 */
        .duty-table th.stats-col,
        .duty-table td.stats-col {
            background: #fafafa;
            font-weight: 600;
            min-width: 50px;
        }

        /* 统计行 */
        .duty-table tr.stats-row td {
            background: #f5f7fa;
            font-weight: 600;
            border-top: 2px solid #dcdfe6;
        }

        /* 页脚统计 */
        .page-footer {
            background: #fff;
            border-radius: 4px;
            padding: 15px;
            margin-top: 15px;
            border: 1px solid #dcdfe6;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .stat-label {
            font-size: 13px;
            color: #909399;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 600;
            color: #409eff;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #909399;
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #909399;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        /* 高亮显示 */
        .highlight-row td {
            background: #fff7e6 !important;
        }

        .highlight-col {
            background: #fff7e6 !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 页面头部 -->
        <div class="page-header">
            <h1>📊 值班表预览</h1>
            <div class="header-actions">
                <a href="/records" class="btn btn-back">⬅️ 返回记录页</a>
                <button onclick="exportTable('csv')" class="btn btn-export-csv">📥 导出 CSV</button>
                <button onclick="exportTable('excel')" class="btn btn-export-excel">📥 导出 Excel</button>
            </div>
        </div>

        <!-- Sheet 切换 -->
        <div class="sheet-tabs" id="sheetTabs">
            <!-- 动态生成 -->
        </div>

        <!-- 筛选区域 -->
        <div class="filter-section">
            <div class="filter-group">
                <label>月份：</label>
                <input type="month" id="monthSelect">
            </div>
            <div class="filter-group">
                <label>搜索：</label>
                <input type="text" id="searchInput" class="search-input" placeholder="搜索姓名...">
            </div>
            <button onclick="applyFilters()" class="btn btn-apply">✓ 应用</button>
            <button onclick="clearFilters()" class="btn btn-clear">✕ 清除</button>
        </div>

        <!-- 表格区域 -->
        <div class="table-container">
            <table class="duty-table" id="dutyTable">
                <!-- 动态生成 -->
            </table>
        </div>

        <!-- 页脚统计 -->
        <div class="page-footer" id="pageFooter">
            <div class="stat-item">
                <span class="stat-label">总人数：</span>
                <span class="stat-value" id="totalPersons">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">累计值班：</span>
                <span class="stat-value" id="totalShifts">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">人均值班：</span>
                <span class="stat-value" id="avgShifts">0</span>
            </div>
        </div>
    </div>

    <script>
        // 全局数据存储
        let currentSheet = '会议室';
        let allData = {};
        let filteredData = {};
        let groups = [];

        // 页面初始化
        window.addEventListener('DOMContentLoaded', () => {
            const now = new Date();
            const bjTimestamp = now.getTime() + (8 * 60 * 60 * 1000);
            const bjTime = new Date(bjTimestamp);
            const pad = (n) => String(n).padStart(2, '0');
            const currentMonth = `${bjTime.getUTCFullYear()}-${pad(bjTime.getUTCMonth() + 1)}`;
            
            document.getElementById('monthSelect').value = currentMonth;
            
            // 加载数据
            loadData();
        });

        // 加载所有数据
        async function loadData() {
            try {
                // 获取所有打卡记录
                const recordsResponse = await fetch('/api/records');
                const records = await recordsResponse.json();
                
                // 获取所有分组
                const groupsResponse = await fetch('/api/groups');
                const groupsResult = await groupsResponse.json();
                groups = groupsResult.data || [];
                
                console.log('打卡记录:', records.length);
                console.log('分组:', groups);
                
                // 按分组整理数据
                allData = processDataByGroup(records);
                
                // 生成 Sheet 切换
                renderSheetTabs();
                
                // 加载第一个分组
                if (groups.length > 0) {
                    currentSheet = groups[0].name;
                    renderTable(currentSheet);
                }
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('dutyTable').innerHTML = `
                    <tr><td colspan="35" class="empty">
                        <div class="empty-icon">📭</div>
                        <div>加载失败：${error.message}</div>
                    </td></tr>
                `;
            }
        }

        // 按分组处理数据
        function processDataByGroup(records) {
            const data = {};
            
            // 初始化每个分组
            groups.forEach(group => {
                data[group.name] = {
                    persons: [],
                    records: {} // {姓名: {日期：1}}
                };
            });
            
            // 没有分组的记录放入"未分组"
            if (!data['未分组']) {
                data['未分组'] = { persons: [], records: {} };
            }
            
            // 处理每条记录
            records.forEach(record => {
                const groupName = record.group_name || '未分组';
                if (!data[groupName]) {
                    data[groupName] = { persons: [], records: {} };
                }
                
                const name = record.name;
                const date = record.duty_date;
                const day = parseInt(date.split('-')[2]);
                
                if (!data[groupName].persons.includes(name)) {
                    data[groupName].persons.push(name);
                }
                
                if (!data[groupName].records[name]) {
                    data[groupName].records[name] = {};
                }
                
                data[groupName].records[name][day] = 1;
            });
            
            // 按姓名排序
            Object.keys(data).forEach(groupName => {
                data[groupName].persons.sort();
            });
            
            return data;
        }

        // 渲染 Sheet 切换
        function renderSheetTabs() {
            const tabs = document.getElementById('sheetTabs');
            tabs.innerHTML = groups.map((group, index) => `
                <div class="sheet-tab ${index === 0 ? 'active' : ''}" 
                     onclick="switchSheet('${group.name}')">
                    ${group.name}
                </div>
            `).join('');
            
            if (groups.length === 0) {
                tabs.innerHTML = '<div class="sheet-tab active">未分组</div>';
            }
        }

        // 切换 Sheet
        window.switchSheet = function(sheetName) {
            currentSheet = sheetName;
            
            // 更新激活状态
            document.querySelectorAll('.sheet-tab').forEach(tab => {
                tab.classList.toggle('active', tab.textContent.trim() === sheetName);
            });
            
            renderTable(sheetName);
        }

        // 渲染表格
        function renderTable(sheetName) {
            const table = document.getElementById('dutyTable');
            const data = allData[sheetName] || { persons: [], records: {} };
            
            if (data.persons.length === 0) {
                table.innerHTML = `
                    <tr><td colspan="35" class="empty">
                        <div class="empty-icon">📭</div>
                        <div>暂无数据</div>
                    </td></tr>
                `;
                updateStats(0, 0);
                return;
            }
            
            // 获取当前月份的天数
            const monthSelect = document.getElementById('monthSelect').value;
            const [year, month] = monthSelect.split('-').map(Number);
            const daysInMonth = new Date(year, month, 0).getDate();
            
            // 构建表头
            let html = '<thead><tr>';
            html += '<th>姓名</th>';
            for (let day = 1; day <= daysInMonth; day++) {
                html += `<th>${day}号</th>`;
            }
            html += '<th class="stats-col">累计</th></tr></thead>';
            
            // 构建表体
            html += '<tbody>';
            let totalShifts = 0;
            
            data.persons.forEach(name => {
                const personRecords = data.records[name] || {};
                let personShifts = 0;
                
                html += `<tr data-name="${name}">`;
                html += `<td onclick="highlightRow('${name}')">${name}</td>`;
                
                for (let day = 1; day <= daysInMonth; day++) {
                    const hasShift = personRecords[day] ? 1 : '';
                    if (hasShift) personShifts++;
                    html += `<td class="${hasShift ? 'value-1' : ''}" data-day="${day}">${hasShift}</td>`;
                }
                
                html += `<td class="stats-col">${personShifts}</td></tr>`;
                totalShifts += personShifts;
            });
            
            // 统计行
            html += '<tr class="stats-row"><td>累计</td>';
            for (let day = 1; day <= daysInMonth; day++) {
                let dayCount = 0;
                data.persons.forEach(name => {
                    if (data.records[name] && data.records[name][day]) {
                        dayCount++;
                    }
                });
                html += `<td class="stats-col">${dayCount}</td>`;
            }
            html += `<td class="stats-col">${totalShifts}</td></tr>`;
            
            html += '</tbody>';
            
            table.innerHTML = html;
            updateStats(data.persons.length, totalShifts);
        }

        // 更新统计
        function updateStats(totalPersons, totalShifts) {
            document.getElementById('totalPersons').textContent = totalPersons;
            document.getElementById('totalShifts').textContent = totalShifts;
            document.getElementById('avgShifts').textContent = totalPersons > 0 
                ? (totalShifts / totalPersons).toFixed(1) 
                : '0';
        }

        // 应用筛选
        window.applyFilters = function() {
            const searchInput = document.getElementById('searchInput').value.trim().toLowerCase();
            
            // 高亮匹配的行
            document.querySelectorAll('#dutyTable tbody tr[data-name]').forEach(row => {
                const name = row.getAttribute('data-name').toLowerCase();
                if (searchInput && name.includes(searchInput)) {
                    row.classList.add('highlight-row');
                } else {
                    row.classList.remove('highlight-row');
                }
            });
        }

        // 清除筛选
        window.clearFilters = function() {
            document.getElementById('searchInput').value = '';
            document.querySelectorAll('#dutyTable tbody tr[data-name]').forEach(row => {
                row.classList.remove('highlight-row');
            });
        }

        // 高亮行
        window.highlightRow = function(name) {
            // 移除所有高亮
            document.querySelectorAll('.highlight-row').forEach(row => {
                row.classList.remove('highlight-row');
            });
            
            // 高亮当前行
            const row = document.querySelector(`#dutyTable tbody tr[data-name="${name}"]`);
            if (row) {
                row.classList.add('highlight-row');
            }
        }

        // 导出表格
        window.exportTable = function(format) {
            const data = allData[currentSheet] || { persons: [], records: {} };
            const monthSelect = document.getElementById('monthSelect').value;
            const [year, month] = monthSelect.split('-').map(Number);
            const daysInMonth = new Date(year, month, 0).getDate();
            
            if (data.persons.length === 0) {
                alert('⚠️ 没有可导出的数据');
                return;
            }
            
            const filename = `${currentSheet}值班表_${year}${String(month).padStart(2, '0')}`;
            
            if (format === 'csv') {
                exportCSV(filename, data, daysInMonth);
            } else if (format === 'excel') {
                alert('💡 提示：浏览器环境建议使用 CSV 格式，可用 Excel 打开');
                exportCSV(filename, data, daysInMonth);
            }
        }

        // 导出 CSV
        function exportCSV(filename, data, daysInMonth) {
            // 添加 BOM 让 Excel 正确识别中文
            let content = '\uFEFF';
            
            // 表头
            content += '姓名,';
            for (let day = 1; day <= daysInMonth; day++) {
                content += `${day}号,'`;
            }
            content += '累计\n';
            
            // 数据行
            data.persons.forEach(name => {
                const personRecords = data.records[name] || {};
                let personShifts = 0;
                
                content += `${name},`;
                for (let day = 1; day <= daysInMonth; day++) {
                    const hasShift = personRecords[day] ? '1' : '';
                    if (hasShift) personShifts++;
                    content += `${hasShift},`;
                }
                content += `${personShifts}\n`;
            });
            
            // 统计行
            content += '累计,';
            for (let day = 1; day <= daysInMonth; day++) {
                let dayCount = 0;
                data.persons.forEach(name => {
                    if (data.records[name] && data.records[name][day]) {
                        dayCount++;
                    }
                });
                content += `${dayCount},`;
            }
            const totalShifts = data.persons.reduce((sum, name) => {
                const personRecords = data.records[name] || {};
                return sum + Object.keys(personRecords).length;
            }, 0);
            content += `${totalShifts}\n`;
            
            // 下载
            const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${filename}.csv`;
            link.click();
            URL.revokeObjectURL(link.href);
            
            alert(`✅ 已导出 ${data.persons.length} 人的值班表`);
        }
    </script>
</body>
</html>
