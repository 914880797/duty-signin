<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排班查询</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #2a2a40;
        }
        h1 { color: #fff; margin-bottom: 20px; }
        .filter-section {
            background: rgba(108, 99, 255, 0.1);
            border: 1px solid rgba(108, 99, 255, 0.3);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .filter-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .filter-group {
            flex: 1;
            min-width: 200px;
        }
        .filter-group label {
            display: block;
            margin-bottom: 8px;
            color: #b0b0c0;
            font-size: 14px;
        }
        .filter-group select, .filter-group input {
            width: 100%;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #3a3a50;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        .filter-group select:focus, .filter-group input:focus {
            outline: none;
            border-color: #6c63ff;
        }
        .btn {
            padding: 12px 25px;
            background: linear-gradient(90deg, #6c63ff, #4a41d4);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }
        .btn:hover { opacity: 0.9; }
        .btn-secondary {
            background: linear-gradient(90deg, #9e9e9e, #757575);
        }
        .result {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            max-height: 600px;
            overflow-y: auto;
        }
        .group-section {
            margin-bottom: 20px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #2a2a40;
            border-radius: 10px;
        }
        .group-header {
            background: rgba(108, 99, 255, 0.2);
            padding: 12px 20px;
            border-left: 4px solid #6c63ff;
            font-weight: bold;
            color: #6c63ff;
            font-size: 16px;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid #2a2a40;
            background: rgba(30, 30, 60, 0.5);
        }
        .result-item:last-child {
            border-bottom: none;
        }
        .result-item:hover {
            background: rgba(108, 99, 255, 0.1);
        }
        .result-time {
            color: #6c63ff;
            font-weight: bold;
            min-width: 100px;
        }
        .result-name {
            color: #e0e0e0;
            flex: 1;
        }
        .empty {
            padding: 40px;
            text-align: center;
            color: #8c92ac;
        }
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(90deg, #4a4a4a, #2a2a2a);
            color: #e0e0e0;
            text-decoration: none;
            border-radius: 8px;
            margin: 5px;
            font-size: 14px;
        }
        .back-btn:hover { opacity: 0.8; }
        .stats {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: rgba(108, 99, 255, 0.1);
            border: 1px solid rgba(108, 99, 255, 0.3);
            border-radius: 8px;
            padding: 12px 20px;
            flex: 1;
            min-width: 150px;
            text-align: center;
        }
        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #6c63ff;
        }
        .stat-label {
            font-size: 12px;
            color: #8c92ac;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 排班查询</h1>
        
        <!-- 筛选区域 -->
        <div class="filter-section">
            <div style="margin-bottom:15px;">
                <a href="/" class="back-btn" style="margin-right:5px;">🏠 首页</a>
                <a href="/admin.html" class="back-btn" style="margin-right:5px;">📅 排班管理</a>
                <a href="/dashboard.html" class="back-btn" style="margin-right:5px;">📊 数据看板</a>
                <a href="/records.html" class="back-btn" style="margin-right:5px;">📋 详细记录</a>
                <a href="/export.html" class="back-btn">📥 导出预览</a>
            </div>
            <div class="filter-row">
                <div class="filter-group">
                    <label>选择时段</label>
                    <select id="shiftSelect">
                        <option value="">-- 全部时段 --</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>选择分组</label>
                    <select id="groupSelect">
                        <option value="">-- 全部分组 --</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>按姓名搜索</label>
                    <input type="text" id="nameSearch" placeholder="输入姓名关键词">
                </div>
            </div>
            
            <div>
                <button onclick="queryRoster()" class="btn">🔍 查询</button>
                <button onclick="clearFilters()" class="btn btn-secondary">清除筛选</button>
            </div>
        </div>
        
        <!-- 统计信息 -->
        <div id="stats" class="stats" style="display: none;"></div>

        <!-- 结果区域 -->
        <div id="result" class="result" style="display: none;"></div>
    </div>

    <script>
        const defaultShifts = [
            { name: '04:00-06:00' },
            { name: '06:00-08:00' },
            { name: '08:00-09:30' },
            { name: '09:30-11:00' },
            { name: '11:00-12:30' },
            { name: '12:30-14:00' },
            { name: '14:00-15:30' },
            { name: '15:30-17:00' },
            { name: '17:00-18:30' },
            { name: '18:30-20:00' },
            { name: '20:00-21:30' },
            { name: '21:30-23:00' },
            { name: '23:00-24:00' },
            { name: '24:00-04:00' }
        ];

        let allGroups = [];
        let allRoster = [];
        let filteredRoster = [];

        window.addEventListener('DOMContentLoaded', function() {
            loadShifts();
            loadGroups();
        });

        // 加载时段选项
        function loadShifts() {
            const shiftSelect = document.getElementById('shiftSelect');
            const options = defaultShifts.map(shift => 
                `<option value="${shift.name}">${shift.name}</option>`
            ).join('');
            shiftSelect.innerHTML = '<option value="">-- 全部时段 --</option>' + options;
        }

        // 加载分组列表
        async function loadGroups() {
            try {
                const response = await fetch('/api/groups');
                const data = await response.json();
                
                if (data.success) {
                    allGroups = data.data || [];
                    const groupSelect = document.getElementById('groupSelect');
                    const options = allGroups.map(g => 
                        `<option value="${g.id}">${g.name}</option>`
                    ).join('');
                    groupSelect.innerHTML = '<option value="">-- 全部分组 --</option>' + options;
                }
            } catch (error) {
                console.error('加载分组失败:', error);
            }
        }

        function clearFilters() {
            document.getElementById('shiftSelect').value = '';
            document.getElementById('groupSelect').value = '';
            document.getElementById('nameSearch').value = '';
            document.getElementById('result').style.display = 'none';
            document.getElementById('stats').style.display = 'none';
        }

        async function queryRoster() {
            const shift = document.getElementById('shiftSelect').value;
            const groupId = document.getElementById('groupSelect').value;
            const nameSearch = document.getElementById('nameSearch').value.trim();
            
            // 使用北京时间获取今天日期查询排班
            const now = new Date();
            const bjTimestamp = now.getTime() + (8 * 60 * 60 * 1000);
            const bjTime = new Date(bjTimestamp);
            const pad = (n) => String(n).padStart(2, '0');
            const today = `${bjTime.getUTCFullYear()}-${pad(bjTime.getUTCMonth() + 1)}-${pad(bjTime.getUTCDate())}`;
            
            const resultEl = document.getElementById('result');
            resultEl.style.display = 'block';
            resultEl.innerHTML = '<div class="empty">查询中...</div>';

            try {
                const response = await fetch(`/api/config?date=${today}`);
                const data = await response.json();

                if (!response.ok || !data.success) {
                    resultEl.innerHTML = '<div class="empty">❌ 查询失败：' + (data.error || '未知错误') + '</div>';
                    return;
                }

                allRoster = data.data || [];
                
                // 筛选数据
                filteredRoster = allRoster.filter(item => {
                    // 时段筛选
                    if (shift && item.duty_time !== shift) return false;
                    // 分组筛选
                    if (groupId && item.group_id != groupId) return false;
                    // 姓名筛选
                    if (nameSearch && !item.name.toLowerCase().includes(nameSearch.toLowerCase())) return false;
                    return true;
                });

                renderResults(filteredRoster);
                renderStats(filteredRoster);
            } catch (error) {
                console.error('查询失败:', error);
                resultEl.innerHTML = '<div class="empty">❌ 网络请求失败</div>';
            }
        }

        function renderStats(data) {
            const statsEl = document.getElementById('stats');
            
            // 按分组统计
            const groupStats = {};
            data.forEach(item => {
                const groupName = item.group_name || '未分组';
                if (!groupStats[groupName]) {
                    groupStats[groupName] = 0;
                }
                groupStats[groupName]++;
            });
            
            let statsHtml = `
                <div class="stat-card">
                    <div class="stat-number">${data.length}</div>
                    <div class="stat-label">总人数</div>
                </div>
            `;
            
            Object.keys(groupStats).forEach(groupName => {
                statsHtml += `
                    <div class="stat-card">
                        <div class="stat-number">${groupStats[groupName]}</div>
                        <div class="stat-label">${groupName}</div>
                    </div>
                `;
            });
            
            statsEl.innerHTML = statsHtml;
            statsEl.style.display = 'flex';
        }

        function renderResults(data) {
            const resultEl = document.getElementById('result');
            
            if (data.length === 0) {
                resultEl.innerHTML = '<div class="empty">未找到匹配的排班</div>';
                return;
            }
            
            // 按分组归类
            const groupedData = {};
            data.forEach(item => {
                const groupName = item.group_name || '未分组';
                if (!groupedData[groupName]) {
                    groupedData[groupName] = [];
                }
                groupedData[groupName].push(item);
            });
            
            // 按分组顺序排序
            const sortedGroups = Object.keys(groupedData).sort((a, b) => {
                if (a === '未分组') return 1;
                if (b === '未分组') return -1;
                const groupA = allGroups.find(g => g.name === a);
                const groupB = allGroups.find(g => g.name === b);
                return (groupA?.order_index || 999) - (groupB?.order_index || 999);
            });
            
            // 渲染结果
            let html = '';
            sortedGroups.forEach(groupName => {
                const items = groupedData[groupName];
                // 按时段排序
                items.sort((a, b) => (a.duty_time || '').localeCompare(b.duty_time || ''));
                
                html += `
                    <div class="group-section">
                        <div class="group-header">${groupName} (${items.length}人)</div>
                        ${items.map(item => `
                            <div class="result-item">
                                <span class="result-time">${item.duty_time}</span>
                                <span class="result-name">${item.name}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            });
            
            resultEl.innerHTML = html;
        }
    </script>
</body>
</html>
