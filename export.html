<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>导出预览</title>
    <script src="/utils/date-utils.js"></script>
    <script src="/xlsx.full.min.js?v=202606121234"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: #fff;
            color: #333;
            padding: 12px;
            padding-left: calc(12px + env(safe-area-inset-left));
            padding-right: calc(12px + env(safe-area-inset-right));
            padding-top: calc(12px + env(safe-area-inset-top));
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            min-height: 100dvh;
            overflow-x: hidden;
            word-break: break-word;
            overflow-wrap: break-word;
            -webkit-tap-highlight-color: transparent;
        }
        .container { max-width: 100%; margin: 0 auto; }
        .header-section { text-align: center; margin-bottom: 16px; }
        h1 {
            color: #ff7a1a;
            font-size: clamp(20px, 5vw, 28px);
            font-weight: 700;
            margin-bottom: 16px;
        }

        /* Navigation */
        nav.export-nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
        }
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(90deg, #4a4a4a, #2a2a2a);
            color: #e0e0e0;
            text-decoration: none;
            border-radius: 8px;
            margin: 5px;
            font-size: 14px;
        }
        .back-btn:hover { opacity: 0.8; }

        .nav-links {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 15px;
        }
        .nav-links .back-btn { margin: 0; text-align: center; }

        /* Export buttons */
        .export-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 3px;
            font-size: clamp(12px, 3vw, 14px);
            font-weight: 600;
            cursor: pointer;
            min-height: 44px;
            -webkit-appearance: none;
            appearance: none;
        }
        .btn-back { background: #f5f5f5; border: 1px solid #dcdfe6; color: #606266; text-decoration: none; display: inline-block; }
        .btn-export-excel { background: #0b95c9; color: white; }
        .btn-apply { background: #4CAF50; color: white; padding: 10px 15px; border-radius: 2px; font-size: clamp(12px, 3vw, 13px); }
        .btn-clear { background: #9e9e9e; color: white; padding: 10px 15px; border-radius: 2px; font-size: clamp(12px, 3vw, 13px); }

        /* Stats */
        .stats-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-bottom: 16px;
            padding: 12px 16px;
            background: #f9f9f9;
            border-radius: 4px;
            border: 1px solid #e0e0e0;
        }
        .stat-label { font-size: clamp(11px, 2.5vw, 13px); color: #666; }
        .stat-value { font-size: clamp(14px, 3vw, 16px); font-weight: 700; color: #4CAF50; }

        /* Filter section */
        .filter-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
        }
        .search-input {
            padding: 10px 12px;
            border: 1px solid #dcdfe6;
            border-radius: 2px;
            font-size: clamp(12px, 3vw, 13px);
            width: 100%;
            max-width: 280px;
            min-height: 44px;
            -webkit-appearance: none;
            appearance: none;
        }
        .search-input:focus { outline: none; border-color: #4CAF50; }
        .filter-actions { display: flex; gap: 8px; }

        /* Sheet tabs */
        .sheet-tabs { display: flex; gap: 0; margin-bottom: 16px; flex-wrap: wrap; justify-content: center; }
        .sheet-tab {
            padding: 8px 16px;
            background: #f5f7fa;
            border: 1px solid #dcdfe6;
            border-radius: 2px;
            cursor: pointer;
            font-size: clamp(11px, 2.5vw, 13px);
            margin-right: 2px;
            min-height: 44px;
            line-height: 28px;
        }
        .sheet-tab:hover { background: #e8f5e9; }
        .sheet-tab.active { background: #4CAF50; border-color: #4CAF50; color: #fff; font-weight: 600; }

        /* Table */
        .table-outer-container {
            border: 1px solid #dcdfe6;
            overflow-x: auto;
            overflow-y: auto;
            max-height: 520px;
            min-height: 300px;
            -webkit-overflow-scrolling: touch;
        }
        .duty-table { border-collapse: collapse; font-size: clamp(11px, 2.5vw, 13px); }
        .duty-table thead th {
            background: #4CAF50;
            color: #fff;
            font-weight: 600;
            padding: 6px 8px;
            text-align: center;
            border: 1px solid #dcdfe6;
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .duty-table tbody td {
            padding: 6px 8px;
            text-align: center;
            border: 1px solid #dcdfe6;
            height: 32px;
            white-space: nowrap;
        }
        .duty-table td.date-cell { min-width: 32px; max-width: 32px; }
        .duty-table td.name-col, .duty-table th.name-col {
            position: sticky;
            left: 0;
            z-index: 32;
            background: #ffd700;
            text-align: left;
            min-width: 90px;
            font-weight: 500;
            color: #000;
        }
        .duty-table th.name-col { z-index: 33; background: #ff6b00 !important; color: #fff !important; }
        .duty-table td.name-col { cursor: pointer; }
        .duty-table td.name-col:hover { background: #e8f5e9; }
        .duty-table td.group-col {
            background: #fff;
            text-align: left;
            min-width: 70px;
            font-weight: 500;
            border-left: 2px solid #dcdfe6;
        }
        .duty-table th.group-col { background: #4CAF50; border-left: 2px solid #dcdfe6; }
        .duty-table th.stats-col-fixed, .duty-table td.stats-col-fixed {
            background: #fafafa;
            font-weight: 600;
            min-width: 55px;
            border-left: 2px solid #dcdfe6;
        }
        .duty-table th.stats-col-fixed { background: #4CAF50; }

        .duty-table td.stats-col-fixed:nth-last-child(1) {
            position: sticky;
            right: 0;
            z-index: 20;
        }
        .duty-table th.stats-col-fixed:nth-last-child(1) {
            position: sticky;
            right: 0;
            z-index: 31;
        }
        .duty-table td.value-1 { color: #1a3d5c; font-weight: 600; }
        .duty-table td.makeup { background: #fff3e0; color: #e65100; font-weight: 600; font-size: 11px; }
        .duty-table td.multi-slot { box-shadow: inset 0 0 0 2px #4caf50; }
        .highlight-row td { background: #fff7e6 !important; }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Tablet 600px+ */
        @media (min-width: 600px) {
            body { padding: 20px; padding-left: calc(20px + env(safe-area-inset-left)); padding-right: calc(20px + env(safe-area-inset-right)); }
            .filter-section { flex-direction: row; }
            .search-input { width: 200px; }
            .filter-actions { flex-direction: row; }
            nav.export-nav { gap: 12px; }

            .duty-table td.group-col {
                position: sticky;
                left: 90px;
                z-index: 19;
            }

            .duty-table th.group-col {
                position: sticky;
                left: 90px;
                z-index: 29;
            }

            .duty-table th.stats-col-fixed, .duty-table td.stats-col-fixed {
                position: sticky;
                right: 0;
                z-index: 20;
            }
            .duty-table th.stats-col-fixed { z-index: 30; }
            .duty-table td.stats-col-fixed:nth-last-child(3) { right: 165px; }
            .duty-table td.stats-col-fixed:nth-last-child(2) { right: 110px; }
            .duty-table td.stats-col-fixed:nth-last-child(1) { right: 0; }
            .duty-table th.stats-col-fixed:nth-last-child(3) { right: 165px; z-index: 31; }
            .duty-table th.stats-col-fixed:nth-last-child(2) { right: 110px; z-index: 31; }
            .duty-table th.stats-col-fixed:nth-last-child(1) { right: 0; z-index: 31; }
        }

        /* Desktop 1024px+ */
        @media (min-width: 1024px) {
            body {
                min-height: 100dvh;
                overflow-x: hidden;
                display: flex;
                align-items: flex-start;
                padding: 20px 40px;
            }

            .container {
                width: 100%;
                max-width: 1400px;
                padding-bottom: 60px;
                display: flex;
                flex-direction: column;
                overflow: visible;
            }

            .header-section {
                margin-bottom: 10px;
                flex-shrink: 0;
            }

            .nav-links {
                display: flex;
                justify-content: center;
                gap: 8px;
            }

            .header-section h1 {
                margin-bottom: 6px;
                font-size: 1.4rem;
            }

            .header-section > div[style] {
                margin-bottom: 8px !important;
            }

            .export-buttons {
                margin-bottom: 6px;
            }

            .stats-bar {
                gap: 30px;
                padding: 8px 14px;
                margin-bottom: 6px;
                flex-shrink: 0;
            }

            .filter-section {
                flex-shrink: 0;
                margin-bottom: 8px;
            }

            .sheet-tabs {
                flex-shrink: 0;
                margin-bottom: 6px;
            }

            .table-outer-container {
                flex: 1;
                min-height: 0;
                max-height: 600px;
                overflow-y: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-section">
            <div class="nav-links" style="margin-bottom:15px;">
                <a href="/" class="back-btn">🏠 首页</a>
                <a href="/admin.html" class="back-btn">📅 排班管理</a>
                <a href="/query.html" class="back-btn">🔍 排班查询</a>
                <a href="/dashboard.html" class="back-btn">📊 看板</a>
                <a href="/records.html" class="back-btn">📋 详细记录</a>
                <a href="/makeup.html" class="back-btn">🔄 补卡</a>
            </div>
            <div class="export-buttons" role="toolbar" aria-label="导出操作">
                <button onclick="window.exportExcel()" class="btn btn-export-excel" aria-label="导出为 Excel 文件">导出为 Excel</button>
            </div>
            <div class="stats-bar" aria-label="统计信息">
                <div class="stat-item"><span class="stat-label">总人数：</span><span class="stat-value" id="totalPersons">0</span></div>
                <div class="stat-item"><span class="stat-label">累计值班：</span><span class="stat-value" id="totalShifts">0</span></div>
                <div class="stat-item"><span class="stat-label">人均值班：</span><span class="stat-value" id="avgShifts">0</span></div>
            </div>
            <div class="filter-section" role="search" aria-label="表格筛选">
                <input type="text" id="searchInput" class="search-input" placeholder="搜索姓名..." aria-label="搜索姓名">
                <div class="filter-actions">
                    <button id="btnApply" class="btn btn-apply" aria-label="应用筛选">应用</button>
                    <button id="btnClear" class="btn btn-clear" aria-label="清除筛选">清除</button>
                </div>
            </div>
            <div class="sheet-tabs" id="sheetTabs" role="tablist" aria-label="工作表切换"></div>
        </div>
        <div class="table-outer-container" role="region" aria-label="值班表格" tabindex="0"><table class="duty-table" id="dutyTable" aria-describedby="table-desc"></table></div>
        <div id="table-desc" class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">值班记录表格，可横向滚动查看全部列</div>
    </div>
    <script>
(function() {
    let currentSheet = '', allData = {}, groups = [], cycleStartDate = null, cycleDates = [], dataLoaded = false;

    function init() {
        document.getElementById('btnApply').addEventListener('click', applyFilters);
        document.getElementById('btnClear').addEventListener('click', clearFilters);
        loadSettings();
    }

    function loadSettings() {
        fetch('/api/settings').then(r => r.json()).then(data => {
            cycleStartDate = data.cycleStartDate || DateUtils.formatBeijingDate();
            loadData();
        }).catch(() => {
            cycleStartDate = DateUtils.formatBeijingDate();
            loadData();
        });
    }

    function generateCycleDates(start, end) {
        cycleDates = [];
        const s = new Date(start + 'T00:00:00Z');
        const e = new Date(end + 'T00:00:00Z');
        for (let d = new Date(s); d <= e; d.setUTCDate(d.getUTCDate() + 1)) {
            const year = String(d.getUTCFullYear());
            const month = String(d.getUTCMonth()+1).padStart(2,'0');
            const day = String(d.getUTCDate()).padStart(2,'0');
            cycleDates.push({
                fullDate: year + '-' + month + '-' + day,
                displayDate: (d.getUTCMonth()+1) + '月' + d.getUTCDate() + '号'
            });
        }
    }

    function loadData() {
        Promise.all([fetch('/api/records'), fetch('/api/groups')]).then(([recRes, grpRes]) => {
            return Promise.all([recRes.json(), grpRes.json()]);
        }).then(([recData, grpData]) => {
            const records = recData.success ? (recData.data || []) : (Array.isArray(recData) ? recData : []);
            groups = grpData.data || grpData || [];
            allData = processDataByGroup(records);
            renderSheetTabs();
            if (groups.length > 0) { currentSheet = groups[0].name; renderTable(currentSheet); }
        }).catch(e => {
            console.error('Load failed:', e);
            document.getElementById('dutyTable').innerHTML = '<tr><td colspan="40" class="empty">加载失败：' + e.message + '</td></tr>';
        });
    }

    function processDataByGroup(records) {
        const data = {};
        groups.forEach(g => { data[g.name] = { persons: [], records: {}, maxDate: null }; });
        if (!data['未分组']) data['未分组'] = { persons: [], records: {}, maxDate: null };

        records.forEach(r => {
            const gn = r.group_name || '未分组';
            if (!data[gn]) data[gn] = { persons: [], records: {}, maxDate: null };
            if (!data[gn].persons.includes(r.name)) data[gn].persons.push(r.name);

            const displayDate = DateUtils.getNaturalDate(r.created_at);

            if (!data[gn].records[r.name]) data[gn].records[r.name] = {};
            const cell = data[gn].records[r.name][displayDate];
            const isMakeup = r.record_type === 'makeup' || r.ip_address === 'makeup';

            if (!cell) {
                data[gn].records[r.name][displayDate] = { signin: isMakeup ? 0 : 1, makeup: isMakeup ? 1 : 0 };
            } else {
                if (isMakeup) cell.makeup++;
                else cell.signin++;
            }

            if (!data[gn].maxDate || displayDate > data[gn].maxDate) data[gn].maxDate = displayDate;
        });

        Object.keys(data).forEach(k => data[k].persons.sort());
        generateCycleDates(cycleStartDate, DateUtils.todayBeijing());
        dataLoaded = true;
        return data;
    }

    function renderSheetTabs() {
        const html = groups.length > 0 ? groups.map((g,i) =>
            '<div class="sheet-tab'+(i===0?' active':'')+'" data-group="'+g.name+'" role="tab" aria-selected="'+(i===0?'true':'false')+'">'+g.name+'</div>'
        ).join('') : '<div class="sheet-tab active" role="tab" aria-selected="true">未分组</div>';
        document.getElementById('sheetTabs').innerHTML = html;
        document.querySelectorAll('.sheet-tab').forEach((tab, i) => {
            tab.addEventListener('click', () => {
                currentSheet = tab.dataset.group;
                document.querySelectorAll('.sheet-tab').forEach((t, j) => {
                    t.classList.toggle('active', j === i);
                    t.setAttribute('aria-selected', j === i ? 'true' : 'false');
                });
                renderTable(currentSheet);
            });
        });
    }

    function renderTable(sheetName) {
        const table = document.getElementById('dutyTable');
        const data = allData[sheetName] || { persons: [], records: {} };
        if (data.persons.length === 0) {
            table.innerHTML = '<tr><td colspan="40" class="empty">暂无数据</td></tr>';
            updateGlobalStats();
            return;
        }
        const days = cycleDates.length;
        let html = '<thead><tr><!--姓名--><th class="name-col" scope="col">姓名</th><th class="group-col" scope="col">分组</th>';
        cycleDates.forEach(d => { html += '<th class="date-cell" scope="col">'+d.displayDate+'</th>'; });
        html += '<th class="stats-col-fixed" scope="col">共计</th><th class="stats-col-fixed" scope="col">累计</th><th class="stats-col-fixed" scope="col">缺席</th></tr></thead><tbody>';
        let ts = 0, ta = 0;
        data.persons.forEach(name => {
            const rec = data.records[name] || {};
            let s = 0;
            html += '<tr data-name="'+name+'" data-group="'+sheetName+'"><td class="name-col">'+name+'</td><td class="group-col">'+sheetName+'</td>';
            cycleDates.forEach(d => {
                const cell = rec[d.fullDate];
                const total = cell ? (cell.signin + cell.makeup) : 0;
                const v = total > 0 ? 1 : '';
                const makeupOnly = cell && cell.signin === 0 && cell.makeup > 0;
                const sv = total > 1 ? '<sup>'+total+'</sup>' : '';
                if (v) s++;
                html += '<td class="date-cell'+(v?' value-1':'')+(makeupOnly?' makeup':'')+(total>1?' multi-slot':'')+'" data-date="'+d.fullDate+'">'+(makeupOnly ? '补'+sv : v+sv)+'</td>';
            });
            const a = days - s;
            html += '<td class="stats-col-fixed">'+s+'</td><td class="stats-col-fixed">'+s+'</td><td class="stats-col-fixed">'+a+'</td></tr>';
            ts += s; ta += a;
        });
        html += '</tbody>';
        table.innerHTML = html;
        table.querySelectorAll('td:first-child').forEach(td => {
            td.addEventListener('click', function() {
                const name = this.parentNode.dataset.name;
                document.querySelectorAll('.highlight-row').forEach(r => r.classList.remove('highlight-row'));
                table.querySelectorAll('tr[data-name="'+name+'"]').forEach(r => r.classList.add('highlight-row'));
            });
        });
        updateGlobalStats();
    }

    function updateGlobalStats() {
        let totalP = 0, totalS = 0;
        Object.keys(allData).forEach(gn => {
            const gd = allData[gn];
            if (!gd || !gd.persons) return;
            totalP += gd.persons.length;
            gd.persons.forEach(nm => {
                const rd = gd.records[nm] || {};
                Object.keys(rd).forEach(() => { totalS++; });
            });
        });
        document.getElementById('totalPersons').textContent = totalP;
        document.getElementById('totalShifts').textContent = totalS;
        document.getElementById('avgShifts').textContent = totalP > 0 ? (totalS/totalP).toFixed(1) : '0';
    }

    function applyFilters() {
        const v = document.getElementById('searchInput').value.trim().toLowerCase();
        document.querySelectorAll('#dutyTable tbody tr').forEach(r => {
            r.classList.toggle('highlight-row', v && r.dataset.name.toLowerCase().includes(v));
        });
    }

    function clearFilters() {
        document.getElementById('searchInput').value = '';
        document.querySelectorAll('#dutyTable tbody tr').forEach(r => r.classList.remove('highlight-row'));
    }

    window.exportExcel = function() {
        if (typeof XLSX === 'undefined') { alert('Excel 库未加载'); return; }
        if (!dataLoaded) {
            alert('数据加载中，请稍后再试');
            return;
        }
        if (!groups || groups.length === 0 || Object.keys(allData).length === 0) {
            alert('没有可导出的数据');
            return;
        }
        try {
            const bjNow = DateUtils.getBeijingNow();
            const y = String(bjNow.getUTCFullYear());
            const m = String(bjNow.getUTCMonth()+1).padStart(2,'0');
            const days = cycleDates.length;
            const wb = { SheetNames: [], Sheets: {} };
            groups.forEach(g => {
                const gn = g.name;
                const gd = allData[gn];
                if (!gd || !gd.persons || gd.persons.length === 0) return;
                const data = [['姓名', '分组']];
                cycleDates.forEach(d => { data[0].push(d.displayDate); });
                data[0].push('共计', '累计', '缺席');
                gd.persons.forEach(nm => {
                    const rd = gd.records[nm] || {};
                    let s = 0;
                    const row = [nm, gn];
                    cycleDates.forEach(d => {
                        const raw = rd[d.fullDate];
                        const isMakeup = raw === 2;
                        if (raw) s++;
                        row.push(isMakeup ? '补' : (raw ? 1 : ''));
                    });
                    row.push(s, s, days - s);
                    data.push(row);
                });
                const ws = XLSX.utils.aoa_to_sheet(data);
                wb.SheetNames.push(gn);
                wb.Sheets[gn] = ws;
            });
            if (wb.SheetNames.length === 0) { alert('无数据可导出'); return; }
            const filename = '值班表_' + y + m + '.xlsx';
            XLSX.writeFile(wb, filename);
            alert('已导出 Excel 文件：' + filename);
        } catch (e) {
            console.error('Excel error:', e);
            alert('导出失败：' + e.message);
        }
    }

    window.addEventListener('DOMContentLoaded', init);
})();
    </script>
</body>
</html>
