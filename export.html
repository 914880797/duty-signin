<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导出预览 - 值班打卡系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-back {
            background: rgba(108, 99, 255, 0.2);
            color: white;
            border: 1px solid rgba(108, 99, 255, 0.5);
        }

        .btn-back:hover {
            background: rgba(108, 99, 255, 0.4);
        }

        /* 筛选区域 */
        .filter-section {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #2a2a40;
        }

        .filter-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .filter-group {
            flex: 1;
            min-width: 180px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 8px;
            color: #8c92ac;
            font-size: 14px;
        }

        .filter-group input, .filter-group select {
            width: 100%;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #3a3a50;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }

        /* 分组切换 */
        .group-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .group-tab {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #8c92ac;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: bold;
        }

        .group-tab:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .group-tab.active {
            background: linear-gradient(90deg, #6c63ff, #5a52d5);
            border-color: #6c63ff;
            color: white;
            box-shadow: 0 4px 15px rgba(108, 99, 255, 0.4);
        }

        .group-tab .count {
            margin-left: 8px;
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
        }

        /* 预览信息 */
        .preview-info {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #2a2a40;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .preview-count {
            font-size: 18px;
            color: #6c63ff;
            font-weight: bold;
        }

        .preview-actions {
            display: flex;
            gap: 10px;
        }

        .btn-export-csv {
            background: linear-gradient(90deg, #4caf50, #45a049);
            color: white;
        }

        .btn-export-csv:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }

        .btn-export-json {
            background: linear-gradient(90deg, #ff9800, #f57c00);
            color: white;
        }

        .btn-export-json:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 152, 0, 0.4);
        }

        .btn-export-txt {
            background: linear-gradient(90deg, #2196f3, #1976d2);
            color: white;
        }

        .btn-export-txt:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(33, 150, 243, 0.4);
        }

        /* 数据表格 */
        .table-container {
            overflow-x: auto;
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #2a2a40;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(108, 99, 255, 0.2);
            color: #6c63ff;
            padding: 15px;
            text-align: left;
            font-weight: bold;
            font-size: 14px;
            white-space: nowrap;
        }

        td {
            padding: 12px 15px;
            color: #e0e0e0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 14px;
        }

        tr:hover td {
            background: rgba(108, 99, 255, 0.1);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .loading, .empty {
            text-align: center;
            padding: 60px 20px;
            color: #8c92ac;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .page-header {
                flex-direction: column;
                gap: 15px;
            }

            .header-actions {
                flex-wrap: wrap;
                justify-content: center;
            }

            .filter-section {
                padding: 15px;
            }

            .filter-row {
                flex-direction: column;
            }

            .filter-group {
                width: 100%;
            }

            .preview-info {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .preview-actions {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1>📥 导出预览</h1>
            <div class="header-actions">
                <a href="dashboard.html" class="btn btn-back">📊 返回看板</a>
                <a href="index.html" class="btn btn-back">← 返回主页</a>
            </div>
        </div>

        <!-- 筛选区域 -->
        <div class="filter-section">
            <div class="filter-row">
                <div class="filter-group">
                    <label>开始日期</label>
                    <input type="date" id="startDate">
                </div>
                <div class="filter-group">
                    <label>结束日期</label>
                    <input type="date" id="endDate">
                </div>
                <div class="filter-group">
                    <label>选择时段</label>
                    <select id="shiftSelect">
                        <option value="">-- 全部时段 --</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>选择分组</label>
                    <select id="groupSelect">
                        <option value="">-- 全部分组 --</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>按姓名搜索</label>
                    <input type="text" id="nameSearch" placeholder="输入姓名">
                </div>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button onclick="loadData()" class="btn btn-back">🔄 刷新数据</button>
                <button onclick="clearFilters()" class="btn btn-back">清除筛选</button>
            </div>
        </div>

        <!-- 分组切换 -->
        <div class="group-tabs" id="groupTabs">
            <!-- 动态生成 -->
        </div>

        <!-- 预览信息 -->
        <div class="preview-info">
            <div class="preview-count">
                预览 <span id="previewCount">10</span> 条，共 <span id="totalCount">0</span> 条记录
            </div>
            <div class="preview-actions">
                <button onclick="exportData('csv')" class="btn btn-export-csv">📄 导出 CSV (Excel)</button>
                <button onclick="exportData('json')" class="btn btn-export-json">📝 导出 JSON</button>
                <button onclick="exportData('txt')" class="btn btn-export-txt">📃 导出 TXT</button>
            </div>
        </div>

        <!-- 数据表格 -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>时段</th>
                        <th>姓名</th>
                        <th>分组</th>
                        <th>打卡时间</th>
                        <th>IP 地址</th>
                    </tr>
                </thead>
                <tbody id="recordsBody">
                    <tr>
                        <td colspan="6" class="loading">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let allRecords = [];
        let filteredRecords = [];

        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', () => {
            // 默认日期为今天
            const now = new Date();
            const bjTimestamp = now.getTime() + (8 * 60 * 60 * 1000);
            const bjTime = new Date(bjTimestamp);
            const pad = (n) => String(n).padStart(2, '0');
            const today = `${bjTime.getUTCFullYear()}-${pad(bjTime.getUTCMonth() + 1)}-${pad(bjTime.getUTCDate())}`;
            
            // 默认开始日期为 30 天前
            const startDate = new Date(bjTimestamp - (30 * 24 * 60 * 60 * 1000));
            const startStr = `${startDate.getUTCFullYear()}-${pad(startDate.getUTCMonth() + 1)}-${pad(startDate.getUTCDate())}`;
            
            document.getElementById('endDate').value = today;
            document.getElementById('startDate').value = startStr;

            loadTimeSlots();
            loadGroups().then(() => {
                // 加载完分组后再加载数据，这样分组标签可以正确渲染
                loadData();
            });
        });

        // 加载时段列表
        async function loadTimeSlots() {
            try {
                const response = await fetch('/api/time-slots');
                const slots = await response.json();
                
                const select = document.getElementById('shiftSelect');
                if (Array.isArray(slots)) {
                    slots.forEach(slot => {
                        const option = document.createElement('option');
                        option.value = slot.time_slot;
                        option.textContent = slot.time_slot;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('加载时段失败:', error);
            }
        }

        // 加载分组列表
        async function loadGroups() {
            try {
                const response = await fetch('/api/groups');
                const groups = await response.json();
                
                const select = document.getElementById('groupSelect');
                if (Array.isArray(groups)) {
                    groups.forEach(group => {
                        const option = document.createElement('option');
                        option.value = group.id;
                        option.textContent = group.name;
                        select.appendChild(option);
                    });
                }
                return groups;
            } catch (error) {
                console.error('加载分组失败:', error);
                return [];
            }
        }

        // 加载数据
        async function loadData() {
            const tbody = document.getElementById('recordsBody');
            tbody.innerHTML = '<tr><td colspan="6" class="loading">加载中...</td></tr>';

            const params = new URLSearchParams();
            
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const timeSlot = document.getElementById('shiftSelect').value;
            const groupId = document.getElementById('groupSelect').value;
            const name = document.getElementById('nameSearch').value.trim();

            if (startDate) params.append('start_date', startDate);
            if (endDate) params.append('end_date', endDate);
            if (timeSlot) params.append('time_slot', timeSlot);
            if (groupId) params.append('group_id', groupId);
            if (name) params.append('name', name);

            try {
                const response = await fetch(`/api/records?${params.toString()}`);
                const records = await response.json();
                
                allRecords = records;
                filteredRecords = records;

                // 更新统计
                document.getElementById('totalCount').textContent = records.length;
                document.getElementById('previewCount').textContent = Math.min(10, records.length);

                // 渲染分组切换
                renderGroupTabs();

                if (records.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="6" class="empty">
                                <div class="empty-icon">📭</div>
                                <div>暂无打卡记录</div>
                            </td>
                        </tr>
                    `;
                    return;
                }

                // 显示前 10 条预览
                const previewData = records.slice(0, 10);
                tbody.innerHTML = previewData.map(record => `
                    <tr>
                        <td>${record.duty_date || '-'}</td>
                        <td>${record.duty_time || '-'}</td>
                        <td>${record.name || '-'}</td>
                        <td>${record.group_name || '-'}</td>
                        <td>${record.created_at ? formatTime(record.created_at) : '-'}</td>
                        <td>${record.ip_address || '-'}</td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('加载数据失败:', error);
                tbody.innerHTML = `<tr><td colspan="6" class="empty">加载失败：${error.message}</td></tr>`;
            }
        }

        // 格式化时间（转换为北京时间）
        function formatTime(isoString) {
            const date = new Date(isoString);
            const pad = (n) => String(n).padStart(2, '0');
            return `${date.getUTCFullYear()}-${pad(date.getUTCMonth() + 1)}-${pad(date.getUTCDate())} ${pad(date.getUTCHours())}:${pad(date.getUTCMinutes())}`;
        }

        // 清除筛选
        function clearFilters() {
            const now = new Date();
            const bjTimestamp = now.getTime() + (8 * 60 * 60 * 1000);
            const bjTime = new Date(bjTimestamp);
            const pad = (n) => String(n).padStart(2, '0');
            const today = `${bjTime.getUTCFullYear()}-${pad(bjTime.getUTCMonth() + 1)}-${pad(bjTime.getUTCDate())}`;
            
            const startDate = new Date(bjTimestamp - (30 * 24 * 60 * 60 * 1000));
            const startStr = `${startDate.getUTCFullYear()}-${pad(startDate.getUTCMonth() + 1)}-${pad(startDate.getUTCDate())}`;

            document.getElementById('startDate').value = startStr;
            document.getElementById('endDate').value = today;
            document.getElementById('shiftSelect').value = '';
            document.getElementById('groupSelect').value = '';
            document.getElementById('nameSearch').value = '';
            
            loadData();
        }

        // 渲染分组切换标签
        function renderGroupTabs() {
            const groupCounts = {};
            
            allRecords.forEach(record => {
                const groupName = record.group_name || '未分组';
                groupCounts[groupName] = (groupCounts[groupName] || 0) + 1;
            });
            
            const groupTabsEl = document.getElementById('groupTabs');
            
            // 全部分组
            const allCount = allRecords.length;
            groupTabsEl.innerHTML = `
                <div class="group-tab ${!document.getElementById('groupSelect').value ? 'active' : ''}" 
                     onclick="switchGroup('')">
                    全部分组 <span class="count">${allCount}</span>
                </div>
            `;
            
            // 各个分组
            Object.entries(groupCounts).sort((a, b) => b[1] - a[1]).forEach(([groupName, count]) => {
                const isActive = document.getElementById('groupSelect').value === 
                    (groupName === '未分组' ? '' : groupName);
                
                groupTabsEl.innerHTML += `
                    <div class="group-tab ${groupName === '未分组' && !document.getElementById('groupSelect').value ? '' : (document.getElementById('groupSelect').value === (groupName === '未分组' ? '' : groupName) ? 'active' : '')}" 
                         onclick="switchGroup('${groupName}')">
                        ${groupName} <span class="count">${count}</span>
                    </div>
                `;
            });
        }

        // 切换分组
        function switchGroup(groupName) {
            const groupSelect = document.getElementById('groupSelect');
            
            if (groupName === '' || groupName === '未分组') {
                groupSelect.value = '';
            } else {
                // 查找分组 ID
                const groupOptions = groupSelect.options;
                for (let i = 0; i < groupOptions.length; i++) {
                    if (groupOptions[i].text === groupName) {
                        groupSelect.value = groupOptions[i].value;
                        break;
                    }
                }
                if (!groupSelect.value) {
                    // 如果没有找到，设为空
                    groupSelect.value = '';
                }
            }
            
            loadData();
        }

        // 导出数据
        function exportData(format) {
            if (filteredRecords.length === 0) {
                alert('⚠️ 没有可导出的数据');
                return;
            }

            let content = '';
            let mimeType = '';
            let extension = '';

            const now = new Date();
            const bjTimestamp = now.getTime() + (8 * 60 * 60 * 1000);
            const bjTime = new Date(bjTimestamp);
            const pad = (n) => String(n).padStart(2, '0');
            const dateStr = `${bjTime.getUTCFullYear()}${pad(bjTime.getUTCMonth() + 1)}${pad(bjTime.getUTCDate())}`;
            const filename = `打卡记录_${dateStr}`;

            if (format === 'csv') {
                // CSV 格式（带 BOM，Excel 可识别中文）
                content = '\uFEFF';
                content += '日期，时段，姓名，分组，打卡时间，IP 地址\n';
                content += filteredRecords.map(r => 
                    `"${r.duty_date || ''}","${r.duty_time || ''}","${r.name || ''}","${r.group_name || ''}","${r.created_at || ''}","${r.ip_address || ''}"`
                ).join('\n');
                mimeType = 'text/csv;charset=utf-8;';
                extension = 'csv';
            } else if (format === 'json') {
                // JSON 格式
                content = JSON.stringify(filteredRecords, null, 2);
                mimeType = 'application/json';
                extension = 'json';
            } else if (format === 'txt') {
                // TXT 格式（表格对齐）
                content = '日期          时段      姓名      分组      打卡时间            IP 地址\n';
                content += '='.repeat(80) + '\n';
                content += filteredRecords.map(r => 
                    `${(r.duty_date || '').padEnd(12)} ${(r.duty_time || '').padEnd(8)} ${(r.name || '').padEnd(8)} ${(r.group_name || '').padEnd(8)} ${(r.created_at || '').padEnd(20)} ${(r.ip_address || '')}`
                ).join('\n');
                mimeType = 'text/plain;charset=utf-8;';
                extension = 'txt';
            }

            const blob = new Blob([content], { type: mimeType });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${filename}.${extension}`;
            link.click();
            URL.revokeObjectURL(link.href);

            alert(`✅ 已导出 ${filteredRecords.length} 条记录为 ${filename}.${extension}`);
        }
    </script>
</body>
</html>
