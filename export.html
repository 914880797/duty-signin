<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导出预览 - 值班打卡系统</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js" crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", -apple-system, BlinkMacSystemFont, sans-serif;
            background: #ffffff;
            color: #333;
            padding: 20px 30px;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        .filter-section {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
        }

        .search-input {
            padding: 6px 10px;
            border: 1px solid #dcdfe6;
            border-radius: 2px;
            font-size: 13px;
            width: 200px;
            background: #fff;
        }

        .search-input:focus {
            outline: none;
            border-color: #4CAF50;
        }

        .sheet-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
        }

        .sheet-tab {
            padding: 8px 20px;
            background: #f5f7fa;
            border: 1px solid #dcdfe6;
            border-radius: 2px;
            cursor: pointer;
            font-size: 13px;
            color: #333;
            transition: all 0.2s;
            margin-right: 2px;
        }

        .sheet-tab:hover {
            background: #e8f5e9;
        }

        .sheet-tab.active {
            background: #4CAF50;
            border-color: #4CAF50;
            color: #fff;
            font-weight: 600;
        }

        .header-section {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            color: #ff7a1a;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .export-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
            align-items: center;
        }

        .export-tip {
            text-align: center;
            font-size: 12px;
            color: #ff7a1a;
            margin-bottom: 15px;
            padding: 8px 16px;
            background: #fff7e6;
            border-radius: 4px;
            display: inline-block;
        }

        .export-tip strong {
            font-weight: 600;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 3px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-back {
            background: #f5f5f5;
            border: 1px solid #dcdfe6;
            color: #606266;
        }

        .btn-back:hover {
            background: #e8e8e8;
        }

        .btn-export-csv {
            background: #0b95c9;
            color: white;
        }

        .btn-export-csv:hover {
            background: #0d8cb8;
        }

        .btn-export-excel {
            background: #0b95c9;
            color: white;
        }

        .btn-export-excel:hover {
            background: #0d8cb8;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
            padding: 12px 20px;
            background: #f9f9f9;
            border-radius: 4px;
            border: 1px solid #e0e0e0;
        }

        .stat-item {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .stat-label {
            font-size: 13px;
            color: #666;
        }

        .stat-value {
            font-size: 16px;
            font-weight: 700;
            color: #4CAF50;
        }

        .table-outer-container {
            border: 1px solid #dcdfe6;
            overflow: auto;
            height: 65vh;
        }

        .duty-table {
            border-collapse: collapse;
            font-size: 13px;
        }

        .duty-table thead th {
            background: #4CAF50;
            color: #fff;
            font-weight: 600;
            padding: 6px 8px;
            text-align: center;
            border: 1px solid #dcdfe6;
            white-space: nowrap;
        }

        .duty-table tbody td {
            padding: 6px 8px;
            text-align: center;
            border: 1px solid #dcdfe6;
            height: 32px;
            white-space: nowrap;
        }

        .duty-table td.date-cell {
            min-width: 32px;
            max-width: 32px;
        }

        .duty-table td:first-child {
            position: sticky;
            left: 0;
            z-index: 20;
            background: #fff;
            text-align: left;
            min-width: 80px;
            font-weight: 500;
            cursor: pointer;
        }

        .duty-table td:first-child:hover {
            background: #e8f5e9;
        }

        .duty-table th:first-child {
            position: sticky;
            left: 0;
            z-index: 30;
            background: #4CAF50;
        }

        .duty-table td.group-col {
            position: sticky;
            left: 80px;
            z-index: 19;
            background: #fff;
            text-align: left;
            min-width: 70px;
            font-weight: 500;
            border-left: 2px solid #dcdfe6;
        }

        .duty-table th.group-col {
            position: sticky;
            left: 80px;
            z-index: 29;
            background: #4CAF50;
            border-left: 2px solid #dcdfe6;
        }

        .duty-table th.stats-col-fixed,
        .duty-table td.stats-col-fixed {
            position: sticky;
            right: 0;
            background: #fafafa;
            font-weight: 600;
            min-width: 55px;
            z-index: 20;
            border-left: 2px solid #dcdfe6;
        }

        .duty-table th.stats-col-fixed {
            background: #4CAF50;
            z-index: 30;
        }

        .duty-table td.stats-col-fixed:nth-last-child(3) {
            right: 165px;
        }

        .duty-table td.stats-col-fixed:nth-last-child(2) {
            right: 110px;
        }

        .duty-table td.stats-col-fixed:nth-last-child(1) {
            right: 0;
        }

        .duty-table th.stats-col-fixed:nth-last-child(3) {
            right: 165px;
            z-index: 31;
        }

        .duty-table th.stats-col-fixed:nth-last-child(2) {
            right: 110px;
            z-index: 31;
        }

        .duty-table th.stats-col-fixed:nth-last-child(1) {
            right: 0;
            z-index: 31;
        }

        .duty-table td.value-1 {
            color: #1a3d5c;
            font-weight: 600;
            background: #fff;
        }

        .highlight-row td {
            background: #fff7e6 !important;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 14px;
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            font-size: 14px;
        }

        .filter-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn-apply {
            background: #4CAF50;
            color: white;
            padding: 6px 15px;
            border-radius: 2px;
            font-size: 13px;
        }

        .btn-apply:hover {
            background: #45a049;
        }

        .btn-clear {
            background: #9e9e9e;
            color: white;
            padding: 6px 15px;
            border-radius: 2px;
            font-size: 13px;
        }

        .btn-clear:hover {
            background: #909090;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="filter-section">
            <input type="text" id="searchInput" class="search-input" placeholder="搜索姓名...">
            <div class="filter-actions">
                <button onclick="applyFilters()" class="btn btn-apply">✓ 应用</button>
                <button onclick="clearFilters()" class="btn btn-clear">✕ 清除</button>
            </div>
        </div>

        <div class="sheet-tabs" id="sheetTabs"></div>

        <div class="header-section">
            <h1>导出预览</h1>
            <div class="export-buttons">
                <a href="/records" class="btn btn-back">⬅️ 返回记录页</a>
                <button onclick="exportCSV()" class="btn btn-export-csv">导出为 CSV</button>
                <button onclick="exportExcel()" class="btn btn-export-excel">导出为 Excel</button>
            </div>
            <div class="export-tip">
                💡 建议使用 <strong>Excel 格式</strong> 导出，可保留会议室/电报分工作表
            </div>
            <div class="stats-bar" id="statsBar">
                <div class="stat-item">
                    <span class="stat-label">总人数：</span>
                    <span class="stat-value" id="totalPersons">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">累计值班：</span>
                    <span class="stat-value" id="totalShifts">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">人均值班：</span>
                    <span class="stat-value" id="avgShifts">0</span>
                </div>
            </div>
        </div>

        <div class="table-outer-container">
            <table class="duty-table" id="dutyTable"></table>
        </div>
    </div>

    <script>
        let currentSheet = '';
        let allData = {};
        let groups = [];
        let cycleStartDate = null;
        let cycleDates = [];

        window.addEventListener('DOMContentLoaded', () => {
            loadSettings();
        });

        async function loadSettings() {
            try {
                const settingsResponse = await fetch('/api/settings');
                const settings = await settingsResponse.json();
                cycleStartDate = settings.cycleStartDate;
                if (!cycleStartDate) {
                    cycleStartDate = new Date().toISOString().split('T')[0];
                }
                loadData();
            } catch (error) {
                console.error('加载设置失败:', error);
                cycleStartDate = new Date().toISOString().split('T')[0];
                loadData();
            }
        }

        function generateCycleDates(startDate, endDate) {
            cycleDates = [];
            const start = new Date(startDate);
            const end = new Date(endDate);
            for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                cycleDates.push({
                    fullDate: year + '-' + month + '-' + day,
                    displayDate: (d.getMonth() + 1) + '月' + d.getDate() + '号',
                    day: d.getDate()
                });
            }
        }

        async function loadData() {
            try {
                const recordsResponse = await fetch('/api/records');
                const records = await recordsResponse.json();
                const groupsResponse = await fetch('/api/groups');
                const groupsResult = await groupsResponse.json();
                groups = groupsResult.data || [];
                allData = processDataByGroup(records);
                renderSheetTabs();
                if (groups.length > 0) {
                    currentSheet = groups[0].name;
                    renderTable(currentSheet);
                }
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('dutyTable').innerHTML = '<tr><td colspan="40" class="empty">加载失败：' + error.message + '</td></tr>';
            }
        }

        function processDataByGroup(records) {
            const data = {};
            groups.forEach(group => {
                data[group.name] = { persons: [], records: {}, maxDate: null };
            });
            if (!data['未分组']) {
                data['未分组'] = { persons: [], records: {}, maxDate: null };
            }
            let globalMaxDate = cycleStartDate;
            records.forEach(record => {
                const groupName = record.group_name || '未分组';
                if (!data[groupName]) {
                    data[groupName] = { persons: [], records: {}, maxDate: null };
                }
                const name = record.name;
                const date = record.duty_date;
                const personKey = name;
                if (!data[groupName].persons.includes(personKey)) {
                    data[groupName].persons.push(personKey);
                }
                if (!data[groupName].records[personKey]) {
                    data[groupName].records[personKey] = {};
                }
                data[groupName].records[personKey][date] = 1;
                if (date > globalMaxDate) {
                    globalMaxDate = date;
                }
                if (!data[groupName].maxDate || date > data[groupName].maxDate) {
                    data[groupName].maxDate = date;
                }
            });
            Object.keys(data).forEach(groupName => {
                data[groupName].persons.sort();
            });
            generateCycleDates(cycleStartDate, globalMaxDate);
            return data;
        }

        function renderSheetTabs() {
            const tabs = document.getElementById('sheetTabs');
            tabs.innerHTML = groups.map((group, index) => 
                '<div class="sheet-tab ' + (index === 0 ? 'active' : '') + '" onclick="switchSheet(\'' + group.name + '\', ' + index + ')">' + group.name + '</div>'
            ).join('');
            if (groups.length === 0) {
                tabs.innerHTML = '<div class="sheet-tab active">未分组</div>';
            }
        }

        window.switchSheet = function(sheetName, index) {
            currentSheet = sheetName;
            document.querySelectorAll('.sheet-tab').forEach((tab, i) => {
                tab.classList.toggle('active', i === index);
            });
            renderTable(sheetName);
        };

        function renderTable(sheetName) {
            const table = document.getElementById('dutyTable');
            const data = allData[sheetName] || { persons: [], records: {} };
            if (data.persons.length === 0) {
                table.innerHTML = '<tr><td colspan="40" class="empty">暂无数据</td></tr>';
                updateStats(0, 0);
                return;
            }
            const totalDays = cycleDates.length;
            let html = '<thead><tr>';
            html += '<th style="position:sticky;left:0;z-index:30;min-width:80px;">姓名</th>';
            html += '<th class="group-col" style="position:sticky;left:80px;z-index:29;">分组</th>';
            cycleDates.forEach(dateInfo => {
                html += '<th class="date-cell">' + dateInfo.displayDate + '</th>';
            });
            html += '<th class="stats-col-fixed" style="right:165px;">共计</th>';
            html += '<th class="stats-col-fixed" style="right:110px;">累计</th>';
            html += '<th class="stats-col-fixed" style="right:0;">缺席</th>';
            html += '</tr></thead><tbody>';
            let totalShifts = 0;
            let totalAbsences = 0;
            data.persons.forEach(personKey => {
                const name = personKey;
                const group = sheetName;
                const personData = data.records[personKey] || {};
                let personShifts = 0;
                html += '<tr data-name="' + name + '" data-group="' + group + '">';
                html += '<td style="position:sticky;left:0;z-index:20;background:#fff;" onclick="highlightRow(\'' + name + '\')">' + name + '</td>';
                html += '<td class="group-col" style="position:sticky;left:80px;z-index:19;background:#fff;">' + group + '</td>';
                cycleDates.forEach(dateInfo => {
                    const hasShift = personData[dateInfo.fullDate] ? 1 : '';
                    if (hasShift) personShifts++;
                    html += '<td class="date-cell ' + (hasShift ? 'value-1' : '') + '" data-date="' + dateInfo.fullDate + '">' + hasShift + '</td>';
                });
                const absences = totalDays - personShifts;
                html += '<td class="stats-col-fixed" style="right:165px;">' + personShifts + '</td>';
                html += '<td class="stats-col-fixed" style="right:110px;">' + personShifts + '</td>';
                html += '<td class="stats-col-fixed" style="right:0;">' + absences + '</td></tr>';
                totalShifts += personShifts;
                totalAbsences += absences;
            });
            html += '</tbody>';
            table.innerHTML = html;
            updateStats(data.persons.length, totalShifts);
        }

        function updateStats(totalPersons, totalShifts) {
            document.getElementById('totalPersons').textContent = totalPersons;
            document.getElementById('totalShifts').textContent = totalShifts;
            document.getElementById('avgShifts').textContent = totalPersons > 0 ? (totalShifts / totalPersons).toFixed(1) : '0';
        }

        window.applyFilters = function() {
            const searchInput = document.getElementById('searchInput').value.trim().toLowerCase();
            document.querySelectorAll('#dutyTable tbody tr[data-name]').forEach(row => {
                const name = row.getAttribute('data-name').toLowerCase();
                if (searchInput && name.includes(searchInput)) {
                    row.classList.add('highlight-row');
                } else {
                    row.classList.remove('highlight-row');
                }
            });
        };

        window.clearFilters = function() {
            document.getElementById('searchInput').value = '';
            document.querySelectorAll('#dutyTable tbody tr[data-name]').forEach(row => {
                row.classList.remove('highlight-row');
            });
        };

        window.highlightRow = function(name) {
            document.querySelectorAll('.highlight-row').forEach(row => {
                row.classList.remove('highlight-row');
            });
            document.querySelectorAll('#dutyTable tbody tr[data-name="' + name + '"]').forEach(row => {
                row.classList.add('highlight-row');
            });
        };

        // 下载 CSV 文件
        function downloadCSV(name, content) {
            const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = name;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        window.exportCSV = function() {
            if (groups.length === 0) {
                alert('⚠️ 没有可导出的数据');
                return;
            }

            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const totalDays = cycleDates.length;

            groups.forEach((groupName, idx) => {
                const groupData = allData[groupName] || { persons: [], records: {} };
                if (groupData.persons.length === 0) return;

                let content = '\uFEFF';
                content += '姓 名\t';
                cycleDates.forEach(dateInfo => {
                    content += dateInfo.displayDate + '\t';
                });
                content += '共计\t累计\t缺席\n';

                groupData.persons.forEach(personKey => {
                    const personData = groupData.records[personKey] || {};
                    let personShifts = 0;
                    content += personKey + '\t';
                    cycleDates.forEach(dateInfo => {
                        const hasShift = personData[dateInfo.fullDate] ? '1' : '';
                        if (hasShift) personShifts++;
                        content += hasShift + '\t';
                    });
                    const absences = totalDays - personShifts;
                    content += personShifts + '\t' + personShifts + '\t' + absences + '\n';
                });

                content += '总计\t';
                cycleDates.forEach(dateInfo => {
                    let dayCount = 0;
                    groupData.persons.forEach(personKey => {
                        const personData = groupData.records[personKey] || {};
                        if (personData[dateInfo.fullDate]) dayCount++;
                    });
                    content += dayCount + '\t';
                });
                const groupTotalShifts = groupData.persons.reduce((sum, personKey) => {
                    const personData = groupData.records[personKey] || {};
                    return sum + Object.keys(personData).filter(k => /^\d{4}-\d{2}-\d{2}$/.test(k)).length;
                }, 0);
                const groupTotalAbsences = groupData.persons.length * totalDays - groupTotalShifts;
                content += groupTotalShifts + '\t' + groupTotalShifts + '\t' + groupTotalAbsences + '\n';

                const filename = '值班表_' + groupName + '_' + year + month + day + '.csv';
                setTimeout(() => {
                    downloadCSV(filename, content);
                }, idx * 500);
            });

            setTimeout(() => {
                alert('已导出 ' + groups.length + ' 个 CSV 文件');
            }, groups.length * 500 + 200);
        };

        window.exportExcel = function() {
            console.log('exportExcel called');
            console.log('groups:', groups);
            console.log('XLSX:', typeof window.XLSX);

            if (groups.length === 0) {
                alert('⚠️ 没有可导出的数据');
                return;
            }

            if (typeof window.XLSX === 'undefined') {
                alert('Excel 库未加载，请刷新页面重试');
                return;
            }

            try {
                const now = new Date();
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const totalDays = cycleDates.length;

                const wb = window.XLSX.utils.book_new();

                groups.forEach(groupName => {
                    const groupData = allData[groupName] || { persons: [], records: {} };
                    console.log('Group:', groupName, 'Persons:', groupData.persons.length);

                    const data = [['姓名']];
                    cycleDates.forEach(dateInfo => {
                        data[0].push(dateInfo.displayDate);
                    });
                    data[0].push('共计', '累计', '缺席');

                    groupData.persons.forEach(personKey => {
                        const personData = groupData.records[personKey] || {};
                        let personShifts = 0;
                        const row = [personKey];
                        cycleDates.forEach(dateInfo => {
                            const hasShift = personData[dateInfo.fullDate] ? 1 : '';
                            if (hasShift) personShifts++;
                            row.push(hasShift);
                        });
                        const absences = totalDays - personShifts;
                        row.push(personShifts, personShifts, absences);
                        data.push(row);
                    });

                    const ws = window.XLSX.utils.aoa_to_sheet(data);
                    window.XLSX.utils.book_append_sheet(wb, ws, groupName);
                    console.log('Sheet added:', groupName);
                });

                const filename = '值班表_' + year + month + '.xlsx';
                console.log('Writing file:', filename);
                window.XLSX.writeFile(wb, filename);
                console.log('File written');
                
                alert('✅ 已导出 Excel 文件：' + filename);
            } catch (error) {
                console.error('Excel 导出失败:', error);
                alert('导出失败：' + error.message);
            }
        };
    </script>
</body>
</html>
