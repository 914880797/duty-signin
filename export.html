<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导出预览 - 值班打卡系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", -apple-system, BlinkMacSystemFont, sans-serif;
            background: #ffffff;
            color: #333;
            padding: 20px 30px;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        .filter-section {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
        }

        .search-input {
            padding: 6px 10px;
            border: 1px solid #dcdfe6;
            border-radius: 2px;
            font-size: 13px;
            width: 200px;
            background: #fff;
        }

        .search-input:focus {
            outline: none;
            border-color: #4CAF50;
        }

        .month-select {
            padding: 6px 10px;
            border: 1px solid #dcdfe6;
            border-radius: 2px;
            font-size: 13px;
            background: #fff;
            cursor: pointer;
        }

        .sheet-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
        }

        .sheet-tab {
            padding: 8px 20px;
            background: #f5f7fa;
            border: 1px solid #dcdfe6;
            border-radius: 2px;
            cursor: pointer;
            font-size: 13px;
            color: #333;
            transition: all 0.2s;
            margin-right: 2px;
        }

        .sheet-tab:hover {
            background: #e8f5e9;
        }

        .sheet-tab.active {
            background: #4CAF50;
            border-color: #4CAF50;
            color: #fff;
            font-weight: 600;
        }

        .header-section {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            color: #ff7a1a;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .export-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 3px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-back {
            background: #f5f5f5;
            border: 1px solid #dcdfe6;
            color: #606266;
        }

        .btn-back:hover {
            background: #e8e8e8;
        }

        .btn-export-csv {
            background: #0b95c9;
            color: white;
        }

        .btn-export-csv:hover {
            background: #0d8cb8;
        }

        .btn-export-excel {
            background: #0b95c9;
            color: white;
        }

        .btn-export-excel:hover {
            background: #0d8cb8;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
            padding: 12px 20px;
            background: #f9f9f9;
            border-radius: 4px;
            border: 1px solid #e0e0e0;
        }

        .stat-item {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .stat-label {
            font-size: 13px;
            color: #666;
        }

        .stat-value {
            font-size: 16px;
            font-weight: 700;
            color: #4CAF50;
        }

        .table-container {
            overflow: auto;
            max-height: 65vh;
            border: 1px solid #dcdfe6;
        }

        .duty-table {
            width: max-content;
            border-collapse: collapse;
            font-size: 13px;
        }

        .duty-table th, .duty-table td {
            border: 1px solid #dcdfe6;
            padding: 6px 8px;
            text-align: center;
            min-width: 32px;
        }

        .duty-table th {
            background: #4CAF50;
            color: #fff;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .duty-table td:first-child,
        .duty-table th:first-child {
            position: sticky;
            left: 0;
            z-index: 15;
            background: #fff;
            text-align: left;
            min-width: 80px;
            font-weight: 500;
        }

        .duty-table th:first-child {
            background: #4CAF50;
            z-index: 30;
        }

        .duty-table td:first-child {
            cursor: pointer;
        }

        .duty-table td:first-child:hover {
            background: #e8f5e9;
        }

        .duty-table th.stats-col,
        .duty-table td.stats-col {
            background: #fafafa;
            font-weight: 600;
            min-width: 55px;
        }

        .duty-table th.stats-col {
            background: #4CAF50;
        }

        .duty-table tr.stats-row td {
            background: #f5f5f5;
            font-weight: 600;
            border-top: 2px solid #dcdfe6;
            color: #333;
        }

        .duty-table td.value-1 {
            color: #1a3d5c;
            font-weight: 600;
            background: #fff;
        }

        .highlight-row td {
            background: #fff7e6 !important;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 14px;
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            font-size: 14px;
        }

        .filter-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn-apply {
            background: #4CAF50;
            color: white;
            padding: 6px 15px;
            border-radius: 2px;
            font-size: 13px;
        }

        .btn-apply:hover {
            background: #45a049;
        }

        .btn-clear {
            background: #9e9e9e;
            color: white;
            padding: 6px 15px;
            border-radius: 2px;
            font-size: 13px;
        }

        .btn-clear:hover {
            background: #909090;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="filter-section">
            <input type="text" id="searchInput" class="search-input" placeholder="搜索姓名...">
            <select id="cycleSelect" class="month-select">
                <option value="">加载中...</option>
            </select>
            <div class="filter-actions">
                <button onclick="applyFilters()" class="btn btn-apply">✓ 应用</button>
                <button onclick="clearFilters()" class="btn btn-clear">✕ 清除</button>
            </div>
        </div>

        <div class="sheet-tabs" id="sheetTabs"></div>

        <div class="header-section">
            <h1>导出预览</h1>
            <div class="export-buttons">
                <a href="/records" class="btn btn-back">⬅️ 返回记录页</a>
                <button onclick="exportTable('csv')" class="btn btn-export-csv">导出为 CSV</button>
                <button onclick="exportTable('excel')" class="btn btn-export-excel">导出为 Excel</button>
            </div>
            <div class="stats-bar" id="statsBar">
                <div class="stat-item">
                    <span class="stat-label">总人数：</span>
                    <span class="stat-value" id="totalPersons">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">累计值班：</span>
                    <span class="stat-value" id="totalShifts">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">人均值班：</span>
                    <span class="stat-value" id="avgShifts">0</span>
                </div>
            </div>
        </div>

        <div class="table-container">
            <table class="duty-table" id="dutyTable"></table>
        </div>
    </div>

    <script>
        let currentSheet = '会议室';
        let allData = {};
        let groups = [];
        let cycleStartDate = null;
        let cycleDates = [];

        window.addEventListener('DOMContentLoaded', () => {
            loadSettings();
        });

        async function loadSettings() {
            try {
                const settingsResponse = await fetch('/api/settings');
                const settings = await settingsResponse.json();
                cycleStartDate = settings.cycleStartDate;
                
                if (!cycleStartDate) {
                    cycleStartDate = new Date().toISOString().split('T')[0];
                }
                
                generateCycleDates(cycleStartDate);
                populateCycleSelect();
                loadData();
            } catch (error) {
                console.error('加载设置失败:', error);
                cycleStartDate = new Date().toISOString().split('T')[0];
                generateCycleDates(cycleStartDate);
                populateCycleSelect();
                loadData();
            }
        }

        function generateCycleDates(startDate) {
            cycleDates = [];
            const start = new Date(startDate);
            for (let i = 0; i < 31; i++) {
                const date = new Date(start);
                date.setDate(date.getDate() + i);
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                cycleDates.push({
                    fullDate: `${year}-${month}-${day}`,
                    displayDate: `${date.getMonth() + 1}月${date.getDate()}号`,
                    day: date.getDate()
                });
            }
        }

        function populateCycleSelect() {
            const select = document.getElementById('cycleSelect');
            const start = new Date(cycleStartDate);
            const year = start.getFullYear();
            const month = String(start.getMonth() + 1).padStart(2, '0');
            select.innerHTML = `<option value="${year}-${month}">${year}年${parseInt(month)}月 (${start.getMonth() + 1}月${start.getDate()}号起)</option>`;
        }

        async function loadData() {
            try {
                const recordsResponse = await fetch('/api/records');
                const records = await recordsResponse.json();
                const groupsResponse = await fetch('/api/groups');
                const groupsResult = await groupsResponse.json();
                groups = groupsResult.data || [];
                allData = processDataByGroup(records);
                renderSheetTabs();
                if (groups.length > 0) {
                    currentSheet = groups[0].name;
                    renderTable(currentSheet);
                }
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('dutyTable').innerHTML = `
                    <tr><td colspan="40" class="empty">加载失败：${error.message}</td></tr>
                `;
            }
        }

        function processDataByGroup(records) {
            const data = {};
            groups.forEach(group => {
                data[group.name] = { persons: [], records: {} };
            });
            if (!data['未分组']) {
                data['未分组'] = { persons: [], records: {} };
            }
            records.forEach(record => {
                const groupName = record.group_name || '未分组';
                if (!data[groupName]) {
                    data[groupName] = { persons: [], records: {} };
                }
                const name = record.name;
                const date = record.duty_date;
                if (!data[groupName].persons.includes(name)) {
                    data[groupName].persons.push(name);
                }
                if (!data[groupName].records[name]) {
                    data[groupName].records[name] = {};
                }
                data[groupName].records[name][date] = 1;
            });
            Object.keys(data).forEach(groupName => {
                data[groupName].persons.sort();
            });
            return data;
        }

        function renderSheetTabs() {
            const tabs = document.getElementById('sheetTabs');
            tabs.innerHTML = groups.map((group, index) => `
                <div class="sheet-tab ${index === 0 ? 'active' : ''}" 
                     onclick="switchSheet('${group.name}')">
                    ${group.name}
                </div>
            `).join('');
            if (groups.length === 0) {
                tabs.innerHTML = '<div class="sheet-tab active">未分组</div>';
            }
        }

        window.switchSheet = function(sheetName) {
            currentSheet = sheetName;
            document.querySelectorAll('.sheet-tab').forEach(tab => {
                tab.classList.toggle('active', tab.textContent.trim() === sheetName);
            });
            renderTable(sheetName);
        }

        function renderTable(sheetName) {
            const table = document.getElementById('dutyTable');
            const data = allData[sheetName] || { persons: [], records: {} };
            if (data.persons.length === 0) {
                table.innerHTML = '<tr><td colspan="40" class="empty">暂无数据</td></tr>';
                updateStats(0, 0);
                return;
            }
            let html = '<thead><tr>';
            html += '<th>姓名</th>';
            cycleDates.forEach(dateInfo => {
                html += `<th>${dateInfo.displayDate}</th>`;
            });
            html += '<th class="stats-col">共计</th>';
            html += '<th class="stats-col">累计</th>';
            html += '<th class="stats-col">缺席</th>';
            html += '</tr></thead><tbody>';
            let totalShifts = 0;
            let totalAbsences = 0;
            data.persons.forEach(name => {
                const personRecords = data.records[name] || {};
                let personShifts = 0;
                html += `<tr data-name="${name}">`;
                html += `<td onclick="highlightRow('${name}')">${name}</td>`;
                cycleDates.forEach(dateInfo => {
                    const hasShift = personRecords[dateInfo.fullDate] ? 1 : '';
                    if (hasShift) personShifts++;
                    html += `<td class="${hasShift ? 'value-1' : ''}" data-date="${dateInfo.fullDate}">${hasShift}</td>`;
                });
                const absences = 31 - personShifts;
                html += `<td class="stats-col">${personShifts}</td>`;
                html += `<td class="stats-col">${personShifts}</td>`;
                html += `<td class="stats-col">${absences}</td></tr>`;
                totalShifts += personShifts;
                totalAbsences += absences;
            });
            html += '<tr class="stats-row"><td>累计</td>';
            cycleDates.forEach(dateInfo => {
                let dayCount = 0;
                data.persons.forEach(name => {
                    if (data.records[name] && data.records[name][dateInfo.fullDate]) {
                        dayCount++;
                    }
                });
                html += `<td class="stats-col">${dayCount}</td>`;
            });
            html += `<td class="stats-col">${totalShifts}</td>`;
            html += `<td class="stats-col">${totalShifts}</td>`;
            html += `<td class="stats-col">${totalAbsences}</td></tr></tbody>`;
            table.innerHTML = html;
            updateStats(data.persons.length, totalShifts);
        }

        function updateStats(totalPersons, totalShifts) {
            document.getElementById('totalPersons').textContent = totalPersons;
            document.getElementById('totalShifts').textContent = totalShifts;
            document.getElementById('avgShifts').textContent = totalPersons > 0 
                ? (totalShifts / totalPersons).toFixed(1) 
                : '0';
        }

        window.applyFilters = function() {
            const searchInput = document.getElementById('searchInput').value.trim().toLowerCase();
            document.querySelectorAll('#dutyTable tbody tr[data-name]').forEach(row => {
                const name = row.getAttribute('data-name').toLowerCase();
                if (searchInput && name.includes(searchInput)) {
                    row.classList.add('highlight-row');
                } else {
                    row.classList.remove('highlight-row');
                }
            });
        }

        window.clearFilters = function() {
            document.getElementById('searchInput').value = '';
            document.querySelectorAll('#dutyTable tbody tr[data-name]').forEach(row => {
                row.classList.remove('highlight-row');
            });
        }

        window.highlightRow = function(name) {
            document.querySelectorAll('.highlight-row').forEach(row => {
                row.classList.remove('highlight-row');
            });
            const row = document.querySelector(`#dutyTable tbody tr[data-name="${name}"]`);
            if (row) {
                row.classList.add('highlight-row');
            }
        }

        window.exportTable = function(format) {
            const data = allData[currentSheet] || { persons: [], records: {} };
            if (data.persons.length === 0) {
                alert('⚠️ 没有可导出的数据');
                return;
            }
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const filename = `${currentSheet}值班表_${year}${month}`;
            exportCSV(filename, data);
        }

        function exportCSV(filename, data) {
            let content = '\uFEFF';
            content += '姓名,';
            cycleDates.forEach(dateInfo => {
                content += `${dateInfo.displayDate},`;
            });
            content += '共计，累计，缺席\n';
            data.persons.forEach(name => {
                const personRecords = data.records[name] || {};
                let personShifts = 0;
                content += `${name},`;
                cycleDates.forEach(dateInfo => {
                    const hasShift = personRecords[dateInfo.fullDate] ? '1' : '';
                    if (hasShift) personShifts++;
                    content += `${hasShift},`;
                });
                const absences = 31 - personShifts;
                content += `${personShifts},${personShifts},${absences}\n`;
            });
            content += '累计,';
            cycleDates.forEach(dateInfo => {
                let dayCount = 0;
                data.persons.forEach(name => {
                    if (data.records[name] && data.records[name][dateInfo.fullDate]) {
                        dayCount++;
                    }
                });
                content += `${dayCount},`;
            });
            const totalShifts = data.persons.reduce((sum, name) => {
                const personRecords = data.records[name] || {};
                return sum + Object.keys(personRecords).length;
            }, 0);
            const totalAbsences = data.persons.length * 31 - totalShifts;
            content += `${totalShifts},${totalShifts},${totalAbsences}\n`;
            const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${filename}.csv`;
            link.click();
            URL.revokeObjectURL(link.href);
            alert(`✅ 已导出 ${data.persons.length} 人的值班表`);
        }
    </script>
</body>
</html>
