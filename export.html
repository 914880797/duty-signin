<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导出预览 - 值班打卡系统</title>
    <script src="xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", sans-serif; background: #fff; color: #333; padding: 20px 30px; }
        .container { max-width: 100%; margin: 0 auto; }
        .filter-section { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; }
        .search-input { padding: 6px 10px; border: 1px solid #dcdfe6; border-radius: 2px; font-size: 13px; width: 200px; }
        .search-input:focus { outline: none; border-color: #4CAF50; }
        .sheet-tabs { display: flex; gap: 0; margin-bottom: 20px; }
        .sheet-tab { padding: 8px 20px; background: #f5f7fa; border: 1px solid #dcdfe6; border-radius: 2px; cursor: pointer; font-size: 13px; margin-right: 2px; }
        .sheet-tab:hover { background: #e8f5e9; }
        .sheet-tab.active { background: #4CAF50; border-color: #4CAF50; color: #fff; font-weight: 600; }
        .header-section { text-align: center; margin-bottom: 25px; }
        h1 { color: #ff7a1a; font-size: 28px; font-weight: 700; margin-bottom: 20px; }
        .export-buttons { display: flex; justify-content: center; gap: 15px; margin-bottom: 10px; align-items: center; flex-wrap: wrap; }
        .export-tip { text-align: center; font-size: 12px; color: #ff7a1a; margin-bottom: 15px; padding: 8px 16px; background: #fff7e6; border-radius: 4px; display: inline-block; }
        .export-tip strong { font-weight: 600; }
        .btn { padding: 10px 24px; border: none; border-radius: 3px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn-back { background: #f5f5f5; border: 1px solid #dcdfe6; color: #606266; text-decoration: none; display: inline-block; }
        .btn-export-excel { background: #0b95c9; color: white; }
        .stats-bar { display: flex; justify-content: center; gap: 40px; margin-bottom: 20px; padding: 12px 20px; background: #f9f9f9; border-radius: 4px; border: 1px solid #e0e0e0; }
        .stat-label { font-size: 13px; color: #666; }
        .stat-value { font-size: 16px; font-weight: 700; color: #4CAF50; }
        .table-outer-container { border: 1px solid #dcdfe6; overflow: auto; height: 65vh; }
        .duty-table { border-collapse: collapse; font-size: 13px; }
        .duty-table thead th { background: #4CAF50; color: #fff; font-weight: 600; padding: 6px 8px; text-align: center; border: 1px solid #dcdfe6; white-space: nowrap; position: sticky; top: 0; z-index: 10; }
        .duty-table tbody td { padding: 6px 8px; text-align: center; border: 1px solid #dcdfe6; height: 32px; white-space: nowrap; }
        .duty-table td.date-cell { min-width: 32px; max-width: 32px; }
        .duty-table td:first-child, .duty-table th:first-child { position: sticky; left: 0; z-index: 20; background: #fff; text-align: left; min-width: 80px; font-weight: 500; }
        .duty-table th:first-child { z-index: 30; }
        .duty-table td:first-child { cursor: pointer; }
        .duty-table td:first-child:hover { background: #e8f5e9; }
        .duty-table td.group-col { position: sticky; left: 80px; z-index: 19; background: #fff; text-align: left; min-width: 70px; font-weight: 500; border-left: 2px solid #dcdfe6; }
        .duty-table th.group-col { position: sticky; left: 80px; z-index: 29; background: #4CAF50; border-left: 2px solid #dcdfe6; }
        .duty-table th.stats-col-fixed, .duty-table td.stats-col-fixed { position: sticky; right: 0; background: #fafafa; font-weight: 600; min-width: 55px; z-index: 20; border-left: 2px solid #dcdfe6; }
        .duty-table th.stats-col-fixed { background: #4CAF50; z-index: 30; }
        .duty-table td.stats-col-fixed:nth-last-child(3) { right: 165px; }
        .duty-table td.stats-col-fixed:nth-last-child(2) { right: 110px; }
        .duty-table td.stats-col-fixed:nth-last-child(1) { right: 0; }
        .duty-table th.stats-col-fixed:nth-last-child(3) { right: 165px; z-index: 31; }
        .duty-table th.stats-col-fixed:nth-last-child(2) { right: 110px; z-index: 31; }
        .duty-table th.stats-col-fixed:nth-last-child(1) { right: 0; z-index: 31; }
        .duty-table td.value-1 { color: #1a3d5c; font-weight: 600; }
        .highlight-row td { background: #fff7e6 !important; }
        .btn-apply { background: #4CAF50; color: white; padding: 6px 15px; border-radius: 2px; font-size: 13px; }
        .btn-clear { background: #9e9e9e; color: white; padding: 6px 15px; border-radius: 2px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-section">
            <h1>导出预览</h1>
            <div class="export-buttons">
                <a href="/" class="btn btn-back">🏠 打卡首页</a>
                <a href="/admin" class="btn btn-back">📅 排班管理</a>
                <a href="/query" class="btn btn-back">🔍 排班查询</a>
                <a href="/dashboard" class="btn btn-back">📊 数据看板</a>
                <a href="/records" class="btn btn-back">📝 详细记录</a>
                <button onclick="window.exportExcel()" class="btn btn-export-excel">📥 导出为 Excel</button>
            </div>
            <div class="stats-bar">
                <div class="stat-item"><span class="stat-label">总人数：</span><span class="stat-value" id="totalPersons">0</span></div>
                <div class="stat-item"><span class="stat-label">累计值班：</span><span class="stat-value" id="totalShifts">0</span></div>
                <div class="stat-item"><span class="stat-label">人均值班：</span><span class="stat-value" id="avgShifts">0</span></div>
            </div>
            <div class="filter-section">
                <input type="text" id="searchInput" class="search-input" placeholder="搜索姓名...">
                <div style="display:flex;gap:8px;">
                    <button id="btnApply" class="btn btn-apply">✓ 应用</button>
                    <button id="btnClear" class="btn btn-clear">✕ 清除</button>
                </div>
            </div>
            <div class="sheet-tabs" id="sheetTabs"></div>
        </div>
        <div class="table-outer-container"><table class="duty-table" id="dutyTable"></table></div>
    </div>
    <script>
(function() {
    let currentSheet = '', allData = {}, groups = [], cycleStartDate = null, cycleDates = [], dataLoaded = false;

    function init() {
        // 绑定按钮事件
        document.getElementById('btnApply').addEventListener('click', applyFilters);
        document.getElementById('btnClear').addEventListener('click', clearFilters);
        loadSettings();
    }

    function loadSettings() {
        fetch('/api/settings').then(r => r.json()).then(data => {
            cycleStartDate = data.cycleStartDate || new Date().toISOString().split('T')[0];
            loadData();
        }).catch(() => {
            cycleStartDate = new Date().toISOString().split('T')[0];
            loadData();
        });
    }

    function generateCycleDates(start, end) {
        cycleDates = [];
        const s = new Date(start), e = new Date(end);
        for (let d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) {
            cycleDates.push({
                fullDate: d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'),
                displayDate: (d.getMonth()+1) + '月' + d.getDate() + '号'
            });
        }
    }

    function loadData() {
        Promise.all([fetch('/api/records'), fetch('/api/groups')]).then(([recRes, grpRes]) => {
            return Promise.all([recRes.json(), grpRes.json()]);
        }).then(([records, grpData]) => {
            console.log('Records:', records.length, 'Groups:', grpData);
            groups = grpData.data || grpData || [];
            console.log('Groups parsed:', groups);
            allData = processDataByGroup(records);
            console.log('allData:', allData);
            renderSheetTabs();
            if (groups.length > 0) { currentSheet = groups[0].name; renderTable(currentSheet); }
        }).catch(e => {
            console.error('Load failed:', e);
            document.getElementById('dutyTable').innerHTML = '<tr><td colspan="40" class="empty">加载失败：' + e.message + '</td></tr>';
        });
    }

    function processDataByGroup(records) {
        const data = {};
        groups.forEach(g => { data[g.name] = { persons: [], records: {}, maxDate: null }; });
        if (!data['未分组']) data['未分组'] = { persons: [], records: {}, maxDate: null };
        let globalMax = cycleStartDate;
        records.forEach(r => {
            const gn = r.group_name || '未分组';
            if (!data[gn]) data[gn] = { persons: [], records: {}, maxDate: null };
            if (!data[gn].persons.includes(r.name)) data[gn].persons.push(r.name);
            if (!data[gn].records[r.name]) data[gn].records[r.name] = {};
            data[gn].records[r.name][r.duty_date] = 1;
            if (r.duty_date > globalMax) globalMax = r.duty_date;
            if (!data[gn].maxDate || r.duty_date > data[gn].maxDate) data[gn].maxDate = r.duty_date;
        });
            Object.keys(data).forEach(k => data[k].persons.sort());
            generateCycleDates(cycleStartDate, globalMax);
            dataLoaded = true;
            return data;
    }

    function renderSheetTabs() {
        const html = groups.length > 0 ? groups.map((g,i) => 
            '<div class="sheet-tab'+(i===0?' active':'')+'" data-group="'+g.name+'">'+g.name+'</div>'
        ).join('') : '<div class="sheet-tab active">未分组</div>';
        document.getElementById('sheetTabs').innerHTML = html;
        // 绑定切换事件
        document.querySelectorAll('.sheet-tab').forEach((tab, i) => {
            tab.addEventListener('click', () => {
                currentSheet = tab.dataset.group;
                document.querySelectorAll('.sheet-tab').forEach((t, j) => t.classList.toggle('active', j === i));
                renderTable(currentSheet);
            });
        });
    }

    function renderTable(sheetName) {
        const table = document.getElementById('dutyTable');
        const data = allData[sheetName] || { persons: [], records: {} };
        console.log('Rendering table for', sheetName, 'persons:', data.persons.length);
        if (data.persons.length === 0) {
            table.innerHTML = '<tr><td colspan="40" class="empty">暂无数据</td></tr>';
            updateStats(0, 0);
            return;
        }
        const days = cycleDates.length;
        let html = '<thead><tr><th>姓名</th><th>分组</th>';
        cycleDates.forEach(d => { html += '<th class="date-cell">'+d.displayDate+'</th>'; });
        html += '<th class="stats-col-fixed">共计</th><th class="stats-col-fixed">累计</th><th class="stats-col-fixed">缺席</th></tr></thead><tbody>';
        let ts = 0, ta = 0;
        data.persons.forEach(name => {
            const rec = data.records[name] || {};
            let s = 0;
            html += '<tr data-name="'+name+'" data-group="'+sheetName+'"><td>'+name+'</td><td>'+sheetName+'</td>';
            cycleDates.forEach(d => {
                const v = rec[d.fullDate] ? 1 : '';
                if (v) s++;
                html += '<td class="date-cell'+(v?' value-1':'')+'" data-date="'+d.fullDate+'">'+v+'</td>';
            });
            const a = days - s;
            html += '<td class="stats-col-fixed">'+s+'</td><td class="stats-col-fixed">'+s+'</td><td class="stats-col-fixed">'+a+'</td></tr>';
            ts += s; ta += a;
        });
        html += '</tbody>';
        table.innerHTML = html;
        // 绑定姓名点击高亮
        table.querySelectorAll('td:first-child').forEach(td => {
            td.addEventListener('click', function() {
                const name = this.parentNode.dataset.name;
                document.querySelectorAll('.highlight-row').forEach(r => r.classList.remove('highlight-row'));
                table.querySelectorAll('tr[data-name="'+name+'"]').forEach(r => r.classList.add('highlight-row'));
            });
        });
        updateStats(data.persons.length, ts);
    }

    function updateStats(p, s) {
        document.getElementById('totalPersons').textContent = p;
        document.getElementById('totalShifts').textContent = s;
        document.getElementById('avgShifts').textContent = p > 0 ? (s/p).toFixed(1) : '0';
    }

    function applyFilters() {
        const v = document.getElementById('searchInput').value.trim().toLowerCase();
        document.querySelectorAll('#dutyTable tbody tr').forEach(r => {
            r.classList.toggle('highlight-row', v && r.dataset.name.toLowerCase().includes(v));
        });
    }

    function clearFilters() {
        document.getElementById('searchInput').value = '';
        document.querySelectorAll('#dutyTable tbody tr').forEach(r => r.classList.remove('highlight-row'));
    }

    // 导出 Excel
    window.exportExcel = function() {
        if (typeof XLSX === 'undefined') { alert('Excel 库未加载'); return; }
        if (!dataLoaded) { 
            alert('⏳ 数据加载中，请稍后再试'); 
            return; 
        }
        if (!groups || groups.length === 0 || Object.keys(allData).length === 0) {
            alert('⚠️ 没有可导出的数据');
            return;
        }
        try {
            const now = new Date(), y = now.getFullYear(), m = String(now.getMonth()+1).padStart(2,'0');
            const days = cycleDates.length;
            const wb = { SheetNames: [], Sheets: {} };
            groups.forEach(g => {
                const gn = g.name;
                const gd = allData[gn];
                if (!gd || !gd.persons || gd.persons.length === 0) return;
                const data = [['姓名', '分组']];
                cycleDates.forEach(d => { data[0].push(d.displayDate); });
                data[0].push('共计', '累计', '缺席');
                gd.persons.forEach(nm => {
                    const rd = gd.records[nm] || {};
                    let s = 0;
                    const row = [nm, gn];
                    cycleDates.forEach(d => {
                        const v = rd[d.fullDate] ? 1 : '';
                        if (v) s++;
                        row.push(v);
                    });
                    row.push(s, s, days - s);
                    data.push(row);
                });
                const ws = XLSX.utils.aoa_to_sheet(data);
                wb.SheetNames.push(gn);
                wb.Sheets[gn] = ws;
            });
            if (wb.SheetNames.length === 0) { alert('无数据可导出'); return; }
            const filename = '值班表_' + y + m + '.xlsx';
            XLSX.writeFile(wb, filename);
            alert('✅ 已导出 Excel 文件：' + filename);
        } catch (e) {
            console.error('Excel error:', e);
            alert('导出失败：' + e.message);
        }
    }

    // 页面加载完成后初始化
    window.addEventListener('DOMContentLoaded', init);
})();
    </script>
</body>
</html>
