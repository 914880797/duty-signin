<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修复分组数据</title>
    <style>
        body {
            background: #1a1a2e;
            color: #fff;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .card {
            background: #16213e;
            padding: 30px;
            border-radius: 8px;
            margin: 20px 0;
        }
        h1 { color: #4fc3f7; }
        h2 { color: #ffb74d; margin-top: 0; }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            margin: 10px 5px;
        }
        .btn-danger {
            background: #f44336;
            color: white;
        }
        .btn-danger:hover {
            background: #d32f2f;
        }
        .btn-success {
            background: #4caf50;
            color: white;
        }
        .btn-success:hover {
            background: #45a049;
        }
        .result {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            font-family: monospace;
            white-space: pre-wrap;
        }
        .warning {
            background: rgba(255, 193, 7, 0.2);
            border: 1px solid #ffc107;
            padding: 15px;
            border-radius: 6px;
            margin: 20px 0;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .stat-box {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 6px;
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #4fc3f7;
        }
        .stat-label {
            font-size: 12px;
            color: #909399;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 分组数据修复工具</h1>
        
        <div class="warning">
            ⚠️ <strong>警告</strong>：此操作将清空所有记录的分组信息，请谨慎操作！
        </div>
        
        <div class="card">
            <h2>当前分组分布</h2>
            <div class="stats" id="stats">
                <div class="stat-box">
                    <div class="stat-value" id="totalRecords">-</div>
                    <div class="stat-label">总记录数</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="group1Records">-</div>
                    <div class="stat-label">会议室 (group_id=1)</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="group2Records">-</div>
                    <div class="stat-label">电报 (group_id=2)</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="nullGroupRecords">-</div>
                    <div class="stat-label">未分组 (group_id=null)</div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h2>修复操作</h2>
            <p style="color: #909399; margin-bottom: 20px;">
                将所有记录的 group_id 重置为 null（未分组状态）
            </p>
            <button onclick="resetGroupId()" class="btn btn-danger">
                🔄 重置所有记录的 group_id
            </button>
            <button onclick="location.href='diagnose.html'" class="btn btn-success">
                📊 查看诊断报告
            </button>
            <div id="result"></div>
        </div>
    </div>
    
    <script>
        async function loadStats() {
            try {
                const response = await fetch('/api/records');
                const records = await response.json();
                
                document.getElementById('totalRecords').textContent = records.length;
                
                const group1 = records.filter(r => r.group_id === 1).length;
                const group2 = records.filter(r => r.group_id === 2).length;
                const nullGroup = records.filter(r => !r.group_id).length;
                
                document.getElementById('group1Records').textContent = group1;
                document.getElementById('group2Records').textContent = group2;
                document.getElementById('nullGroupRecords').textContent = nullGroup;
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }
        
        async function resetGroupId() {
            if (!confirm('⚠️ 确定要将所有记录的 group_id 重置为 null 吗？\n\n此操作不可恢复！')) {
                return;
            }
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="result">处理中...</div>';
            
            try {
                const response = await fetch('/api/admin/reset-group-id', {
                    method: 'POST'
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="result" style="background: rgba(76, 175, 80, 0.2); border: 1px solid #4caf50;">
                            ✅ ${result.message}
                        </div>
                    `;
                    setTimeout(() => loadStats(), 1000);
                } else {
                    resultDiv.innerHTML = `
                        <div class="result" style="background: rgba(244, 67, 54, 0.2); border: 1px solid #f44336;">
                            ❌ 失败：${result.error}
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result" style="background: rgba(244, 67, 54, 0.2); border: 1px solid #f44336;">
                        ❌ 请求失败：${error.message}
                    </div>
                `;
            }
        }
        
        loadStats();
    </script>
</body>
</html>
