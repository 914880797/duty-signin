<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>详细打卡记录</title>
    <script src="/utils/date-utils.js"></script>
    <link rel="stylesheet" href="/styles/shared.css">
    <script>window.SENTRY_DSN=window.SENTRY_DSN||'';window.SENTRY_ENV=window.SENTRY_ENV||'production';</script>
    <script src="/utils/sentry.js"></script>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 12px;
            padding-top: calc(12px + env(safe-area-inset-top));
            padding-right: calc(12px + env(safe-area-inset-right));
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            padding-left: calc(12px + env(safe-area-inset-left));
            font-size: clamp(14px, 2.5vw, 16px);
            line-height: 1.5;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 20px;
            font-size: clamp(1.25rem, 5vw, 1.75rem);
        }

        .page-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        nav.back-nav {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 100%;
        }

        .filter-section {
            padding: 20px;
            margin-bottom: 20px;
        }

        .filter-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .action-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .btn {
            padding: 10px 20px;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }

        .btn:focus-visible {
            outline: 2px solid #fff;
            outline-offset: 2px;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(108, 99, 255, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-export:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.4);
        }

        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .table-container {
            overflow-y: auto;
            max-height: 380px;
            min-height: 200px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 16px;
        }

        th {
            background: rgba(108, 99, 255, 0.2);
            color: #6c63ff;
            text-align: left;
            font-size: clamp(12px, 2.5vw, 14px);
        }

        td {
            color: #e0e0e0;
            font-size: clamp(12px, 2.5vw, 14px);
        }

        tr:hover td {
            background: rgba(108, 99, 255, 0.1);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .loading {
            text-align: center;
            padding: 30px;
            color: #8c92ac;
        }

        .empty {
            padding: 40px 16px;
        }

        .empty-icon {
            font-size: clamp(48px, 10vw, 64px);
            margin-bottom: 16px;
        }

        @media (min-width: 600px) {
            nav.back-nav {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }

            .filter-section {
                padding: 18px;
            }

            .action-bar {
                flex-direction: row;
                align-items: center;
            }

            .btn {
                width: auto;
            }

            .table-container {
                padding: 16px;
                min-height: 300px;
            }
        }

        @media (min-width: 1024px) {
            body {
                padding: 20px 40px;
            }

            .container {
                border-radius: 20px;
                padding: 24px 32px 60px;
            }

            h1 {
                margin-bottom: 12px;
                font-size: 1.5rem;
            }

            .page-header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 12px;
                flex-shrink: 0;
            }

            .filter-section {
                flex-shrink: 0;
                margin-bottom: 16px;
                padding: 20px 24px;
            }

            .filter-row {
                gap: 16px;
            }

            .filter-group {
                min-width: 180px;
            }

            .action-bar {
                flex-direction: row;
                flex-shrink: 0;
            }

            .btn { width: auto; }

            .table-container {
                flex: 1;
                min-height: 0;
                max-height: 600px;
                padding: 16px;
                margin-top: 0;
            }

            .table-wrapper {
                height: 100%;
                overflow-y: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container" role="main">
        <div class="page-header">
            <h1>📋 详细打卡记录</h1>
            <div class="nav-links" style="margin-bottom:15px;">
                <a href="/" class="back-btn">🏠 首页</a>
                <a href="/admin.html" class="back-btn">📅 排班管理</a>
                <a href="/query.html" class="back-btn">🔍 排班查询</a>
                <a href="/dashboard.html" class="back-btn">📊 看板</a>
                <a href="/export.html" class="back-btn">📥 导出预览</a>
                <a href="/makeup.html" class="back-btn">🔄 补卡</a>
            </div>
        </div>

        <!-- 筛选区域 -->
        <div class="filter-section" role="search" aria-label="筛选条件">
            <div class="filter-row">
                <div class="filter-group">
                    <label for="startDate">开始日期</label>
                    <input type="date" id="startDate" aria-label="筛选开始日期">
                </div>

                <div class="filter-group">
                    <label for="endDate">结束日期</label>
                    <input type="date" id="endDate" aria-label="筛选结束日期">
                </div>

                <div class="filter-group">
                    <label for="timeSlotSelect">时段</label>
                    <select id="timeSlotSelect" aria-label="筛选时段">
                        <option value="">全部时段</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="groupSelect">分组</label>
                    <select id="groupSelect" aria-label="筛选分组">
                        <option value="">全部分组</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="nameInput">姓名</label>
                    <input type="text" id="nameInput" placeholder="输入姓名" aria-label="按姓名筛选">
                </div>
            </div>

            <div class="action-bar">
                <button onclick="loadData()" class="btn btn-export" aria-label="刷新数据">刷新数据</button>
                <button onclick="clearFilters()" class="btn btn-back" aria-label="清除所有筛选条件">清除筛选</button>
            </div>
        </div>

        <!-- 数据表格 -->
        <div class="table-container" role="region" aria-label="打卡记录表格" tabindex="0">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th scope="col">日期</th>
                            <th scope="col">时段</th>
                            <th scope="col">姓名</th>
                            <th scope="col">分组</th>
                            <th scope="col">打卡时间</th>
                            <th scope="col">IP 地址</th>
                        </tr>
                    </thead>
                    <tbody id="recordsBody">
                        <tr>
                            <td colspan="6" class="loading">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let allRecords = [];
        let filteredRecords = [];

        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', async () => {
            const today = DateUtils.todayBeijing();

            let startDate = today;
            let validTimes = null;
            try {
                const settingsResp = await fetch('/api/settings');
                const settings = await settingsResp.json();
                if (settings.cycleStartDate) {
                    startDate = settings.cycleStartDate;
                } else {
                    startDate = DateUtils.daysAgoBeijing(30);
                }
                if (settings.validDutyTimes && settings.validDutyTimes.length > 0) {
                    validTimes = settings.validDutyTimes;
                }
            } catch (error) {
                console.error('加载设置失败:', error);
            }

            document.getElementById('endDate').value = today;
            document.getElementById('startDate').value = startDate;

            loadTimeSlots(validTimes);
            loadGroups();
            loadData();
        });

        // 加载时段列表
        async function loadTimeSlots(cachedTimes) {
            try {
                let slots;
                if (cachedTimes && cachedTimes.length > 0) {
                    slots = cachedTimes.map(t => ({ time_slot: t }));
                } else {
                    const response = await fetch('/api/time-slots');
                    const responseData = await response.json();
                    slots = responseData.success ? (responseData.data || []) : [];
                }

                const select = document.getElementById('timeSlotSelect');
                slots.forEach(slot => {
                    const option = document.createElement('option');
                    option.value = slot.time_slot;
                    option.textContent = slot.time_slot;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('加载时段失败:', error);
            }
        }

        // 加载分组列表
        async function loadGroups() {
            try {
                const response = await fetch('/api/groups');
                const result = await response.json();
                const groups = result.success ? (result.data || []) : [];

                const select = document.getElementById('groupSelect');
                if (Array.isArray(groups)) {
                    groups.forEach(group => {
                        const option = document.createElement('option');
                        option.value = group.id;
                        option.textContent = group.name;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('加载分组失败:', error);
            }
        }

        // 加载数据
        async function loadData() {
            const tbody = document.getElementById('recordsBody');
            tbody.innerHTML = '<tr><td colspan="6" class="loading">加载中...</td></tr>';

            const params = new URLSearchParams();

            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const timeSlot = document.getElementById('timeSlotSelect').value;
            const groupId = document.getElementById('groupSelect').value;
            const name = document.getElementById('nameInput').value.trim();

            if (startDate) params.append('start_date', startDate);
            if (endDate) params.append('end_date', endDate);
            if (timeSlot) params.append('duty_time', timeSlot);
            if (groupId) params.append('group_id', groupId);
            if (name) params.append('name', name);

            try {
                const response = await fetch(`/api/records?${params.toString()}`);
                const responseData = await response.json();

                const records = responseData.success ? (responseData.data || []) : [];

                allRecords = records;
                filteredRecords = records;

                if (records.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="6" class="empty">
                                <div class="empty-icon">📭</div>
                                <div>暂无打卡记录</div>
                            </td>
                        </tr>
                    `;
                    return;
                }

                tbody.innerHTML = records.map(record => `
                    <tr>
                        <td>${record.duty_date || '-'}</td>
                        <td>${record.duty_time || '-'}</td>
                        <td>${record.name || '-'}</td>
                        <td>${record.group_name || '-'}</td>
                        <td>${record.created_at ? formatTime(record.created_at) : '-'}</td>
                        <td>${record.ip_address || '-'}</td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('加载数据失败:', error);
                tbody.innerHTML = `<tr><td colspan="6" class="empty">加载失败：${error.message}</td></tr>`;
            }
        }

        // 格式化时间（转换为北京时间）
        function formatTime(isoString) {
            const date = new Date(isoString);
            return DateUtils.formatBeijingTime(date);
        }

        // 清除筛选
        function clearFilters() {
            const today = DateUtils.todayBeijing();
            const startStr = DateUtils.daysAgoBeijing(30);

            document.getElementById('startDate').value = startStr;
            document.getElementById('endDate').value = today;
            document.getElementById('timeSlotSelect').value = '';
            document.getElementById('groupSelect').value = '';
            document.getElementById('nameInput').value = '';

            loadData();
        }
    </script>
</body>
</html>
