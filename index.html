<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0f1a">
    <title>夜聊值班打卡</title>
    <link rel="stylesheet" href="/styles/shared.css">
    <script>window.SENTRY_DSN=window.SENTRY_DSN||'';window.SENTRY_ENV=window.SENTRY_ENV||'production';</script>
    <script src="/utils/sentry.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #0f0f1a;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 12px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 30px 20px;
            text-align: center;
            border: 1px solid #2a2a40;
        }

        .nav-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-bottom: 16px;
        }

        .back-btn {
            padding: 8px 4px;
            margin: 0;
            font-size: 12px;
            transition: opacity 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .clock-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .time-display {
            font-size: clamp(32px, 8vw, 48px);
            font-weight: 300;
            color: #6c63ff;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 2px;
            margin-bottom: 5px;
            font-variant-numeric: tabular-nums;
        }

        .date-display {
            font-size: 14px;
            color: #8c92ac;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .input-header .input-label {
            display: inline;
            margin-bottom: 0;
        }
        .input-header .announcement-bar {
            margin-bottom: 0;
            margin-left: 12px;
            padding: 4px 10px;
            min-height: 28px;
            font-size: 12px;
            flex-shrink: 1;
            min-width: 0;
        }

        .input-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #b0b0c0;
        }

        .text-input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid #3a3a50;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
            -webkit-appearance: none;
            appearance: none;
        }

        .text-input::placeholder { color: #555; }
        .text-input:focus { border-color: #6c63ff; }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #6c63ff, #4a41d4);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 25px;
            min-height: 48px;
            touch-action: manipulation;
        }

        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(108, 99, 255, 0.4); }
        .submit-btn:active { transform: translateY(0); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .info-box {
            background: rgba(30, 30, 60, 0.5);
            border: 1px solid rgba(108, 99, 255, 0.3);
            border-radius: 10px;
            padding: 15px;
            text-align: left;
            margin-top: 20px;
        }

        .info-title {
            color: #6c63ff;
            font-weight: bold;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .shift-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            font-size: 11px;
            color: #ccc;
            margin-bottom: 12px;
        }

        .shift-item {
            background: rgba(108, 99, 255, 0.1);
            padding: 6px 8px;
            border-radius: 4px;
            text-align: center;
            border: 1px solid rgba(108, 99, 255, 0.2);
            word-break: break-all;
            line-height: 1.3;
        }

        .shift-item.night {
            background: rgba(255, 107, 107, 0.15);
            border-color: rgba(255, 107, 107, 0.3);
            color: #ff8a80;
            font-weight: bold;
            grid-column: 1 / -1;
        }

        .rules-list {
            font-size: 12px;
            color: #8c92ac;
            line-height: 1.8;
            border-top: 1px solid rgba(108, 99, 255, 0.2);
            padding-top: 10px;
            margin-top: 10px;
        }

        .rules-list strong { color: #6c63ff; }
        .warning-text { color: #ff6b6b; font-weight: bold; margin-top: 5px; }

        @media (min-width: 600px) and (max-width: 1023px) {
            body { align-items: center; padding: 10px; }
            .container { padding: 24px 32px; }
            .clock-section { padding: 10px 15px; margin-bottom: 12px; }
            .time-display { font-size: 32px; margin-bottom: 2px; }
            .date-display { font-size: 12px; }
            .input-group { margin-bottom: 12px; }
            .text-input { padding: 8px 12px; font-size: 14px; }
            .submit-btn { padding: 8px; font-size: 14px; margin-bottom: 15px; }
            .shift-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; font-size: 10px; }
            .rules-list { font-size: 11px; line-height: 1.5; padding-top: 6px; }
            .info-box { margin-top: 10px; }
            .nav-row { margin: 8px 0; }
            .shift-item.night { grid-column: auto; }
        }

        @media (min-width: 1024px) {
            body { padding: 40px 80px; }
            .container { max-width: 720px; padding: 40px 48px; }
            .nav-row { display: flex; justify-content: center; gap: 8px; margin: 14px 0; }
            .back-btn { padding: 12px 24px; font-size: 15px; }
            .clock-section { padding: 20px; margin-bottom: 20px; }
            .time-display { font-size: 56px; }
            .date-display { font-size: 15px; }
            .input-group { margin-bottom: 20px; }
            .input-label { font-size: 16px; margin-bottom: 10px; }
            .text-input { padding: 14px 18px; font-size: 18px; }
            .submit-btn { padding: 16px; font-size: 20px; margin-bottom: 30px; }
            .shift-grid { grid-template-columns: repeat(4, 1fr); gap: 10px; font-size: 13px; }
            .shift-item { padding: 10px 12px; }
            .info-title { font-size: 16px; margin-bottom: 14px; }
            .info-box { padding: 20px; margin-top: 16px; }
            .rules-list { font-size: 14px; line-height: 2; padding-top: 12px; }
        }

        @media (max-width: 360px) {
            .container { padding: 24px 16px; border-radius: 16px; }
            .shift-grid { grid-template-columns: repeat(2, 1fr); }
            .shift-item.night { grid-column: 1 / -1; }
        }

        .announcement-bar {
            background: rgba(255, 122, 26, 0.15);
            border: 1px solid rgba(255, 122, 26, 0.3);
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 14px;
            overflow: hidden;
            position: relative;
            min-height: 32px;
            display: flex;
            align-items: center;
        }
        .announcement-bar .icon { flex-shrink: 0; margin-right: 8px; font-size: 14px; }
        .announcement-bar .marquee-wrap {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        .announcement-bar .marquee-text {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 30s linear infinite;
            color: #ffb74d;
            font-size: 13px;
        }
        .announcement-bar .marquee-text.empty { color: #666; animation: none; }
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
    </style>
    <script src="/utils/date-utils.js"></script>
    <script src="/utils/frontend-utils.js"></script>
</head>
<body>

    <div class="container">

        <div class="nav-row">
            <a href="/query.html" class="back-btn">🔍 排班</a>
            <a href="/export.html" class="back-btn">打卡查询</a>
            <a href="/makeup.html" class="back-btn">补卡</a>
            <a href="/admin.html" class="back-btn">⚙️ 管理</a>
        </div>

        <div class="clock-section">
            <div class="time-display" id="current-time">00:00:00</div>
            <div class="date-display" id="current-date">--</div>
        </div>

        <form onsubmit="handleSignin(event)" autocomplete="off">
            <div class="input-group">
                <div class="input-header">
                    <label class="input-label" for="name">请输入您的值班姓名</label>
                    <div class="announcement-bar" id="announcementBar" style="display:none;">
                        <span class="icon">📢</span>
                        <div class="marquee-wrap">
                            <span class="marquee-text empty" id="announcementText">暂无公告</span>
                        </div>
                    </div>
                </div>
                <input type="text" id="name" class="text-input" placeholder="例如：领悟" required
                       autocomplete="off" autocapitalize="off" enterKeyHint="go">
            </div>
            <button type="submit" class="submit-btn">立即打卡</button>
        </form>

        <div class="info-box">
            <div class="info-title">📌 值班时段</div>
            <div class="shift-grid" id="shiftGrid">
                <div class="shift-item">04:00-06:00</div>
                <div class="shift-item">06:00-08:00</div>
                <div class="shift-item">08:00-09:30</div>
                <div class="shift-item">09:30-11:00</div>
                <div class="shift-item">11:00-12:30</div>
                <div class="shift-item">12:30-14:00</div>
                <div class="shift-item">14:00-15:30</div>
                <div class="shift-item">15:30-17:00</div>
                <div class="shift-item">17:00-18:30</div>
                <div class="shift-item">18:30-20:00</div>
                <div class="shift-item">20:00-21:30</div>
                <div class="shift-item">21:30-23:00</div>
                <div class="shift-item">23:00-24:00</div>
                <div class="shift-item night">🌙 24:00-04:00 (夜班)</div>
            </div>
            <div class="rules-list">
                <strong>⚠️ 打卡规则：</strong><br>
                1. 只有参与值班的人员才能打卡<br>
                2. 必须在本人值班时间段内打卡<br>
                3. 每人每天每个时段限打卡一次
                <div class="warning-text"></div>
            </div>
        </div>
    </div>

    <script>
        function updateClock() {
            var bj = DateUtils.getBeijingNow();
            var h = String(bj.getUTCHours()).padStart(2, '0');
            var m = String(bj.getUTCMinutes()).padStart(2, '0');
            var s = String(bj.getUTCSeconds()).padStart(2, '0');
            document.getElementById('current-time').innerText = h + ':' + m + ':' + s;
            var Y = bj.getUTCFullYear();
            var M = String(bj.getUTCMonth() + 1).padStart(2, '0');
            var D = String(bj.getUTCDate()).padStart(2, '0');
            document.getElementById('current-date').innerText = Y + '/' + M + '/' + D;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function loadShiftConfig() {
            var shiftConfig = JSON.parse(localStorage.getItem('shiftConfig'));
            if (shiftConfig && shiftConfig.length > 0) {
                renderShiftGrid(shiftConfig);
                return;
            }
            loadShiftConfigFromSettings();
        }

        async function loadShiftConfigFromSettings() {
            try {
                var res = await fetch('/api/settings');
                var data = await res.json();
                var validTimes = data.validDutyTimes || [];
                if (validTimes.length > 0) {
                    var shifts = validTimes.map(function(t, i) { return { id: i + 1, name: t }; });
                    localStorage.setItem('shiftConfig', JSON.stringify(shifts));
                    renderShiftGrid(shifts);
                    return;
                }
            } catch (e) { console.error('加载时段失败:', e); }
            var shifts = AppUtils.DEFAULT_SHIFTS.map(function(t, i) { return { id: i + 1, name: t }; });
            renderShiftGrid(shifts);
        }

        function renderShiftGrid(shiftConfig) {
            var grid = document.getElementById('shiftGrid');
            grid.innerHTML = shiftConfig.map(function(shift) {
                var isNight = isNightShift(shift.name);
                return '<div class="shift-item' + (isNight ? ' night' : '') + '">' +
                    (isNight ? '🌙 ' : '') + shift.name + (isNight ? ' (夜班)' : '') + '</div>';
            }).join('');
        }

        function isNightShift(name) {
            if (!name) return false;
            var match = name.match(/^24:00-(\d{2}):(\d{2})$/);
            if (match) {
                var eh = parseInt(match[1]);
                return eh >= 0 && eh < 8;
            }
            return false;
        }

        loadShiftConfig();
        loadAnnouncements();

        function loadAnnouncements() {
            fetch('/api/announcements').then(r => r.json()).then(data => {
                var list = (data.success ? data.data : []) || [];
                var bar = document.getElementById('announcementBar');
                var text = document.getElementById('announcementText');

                if (list.length === 0) {
                    bar.style.display = 'none';
                    return;
                }

                bar.style.display = 'flex';
                var joined = list.map(function(a) { return a.content.slice(0, 15); }).join('　　');
                text.textContent = joined;
                text.classList.remove('empty');
            }).catch(function() {
                document.getElementById('announcementBar').style.display = 'none';
            });
        }

        async function handleSignin(event) {
            event.preventDefault();
            var nameEl = document.getElementById('name');
            var name = nameEl.value.trim();
            var btn = document.querySelector('.submit-btn');
            if (!name) { nameEl.focus(); return; }
            var currentTime = DateUtils.getBeijingNow().toISOString().substr(11, 5);
            btn.innerText = '打卡中...';
            btn.disabled = true;
            try {
                var response = await fetch('/api/signin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name, duty_time: '', current_time: currentTime })
                });
                var result = await response.json();
                if (response.ok) {
                    alert('✅ 打卡成功！\n日期：' + result.date + '\n时间：' + result.time + '\n值班时段：' + result.duty_time);
                    nameEl.value = '';
                    nameEl.focus();
                } else if (response.status === 400) {
                    alert('⚠️ ' + result.error);
                } else if (response.status === 403) {
                    alert('❌ ' + result.error + '\n\n请确认您的姓名是否与排班表中的完全一致');
                } else {
                    alert('❌ ' + result.error);
                }
            } catch (error) {
                console.error('打卡请求失败:', error);
                alert('❌ 网络请求失败，请检查网络连接');
            } finally {
                btn.innerText = '立即打卡';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
