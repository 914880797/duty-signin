<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夜聊值班打卡</title>
    <style>
        /* --- 全局样式重置 --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* --- 主容器 --- */
        .container {
            width: 100%;
            max-width: 500px;
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 40px;
            text-align: center;
            border: 1px solid #2a2a40;
            position: relative;
        }

        /* --- Logo 和标题 --- */
        .logo {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #fff;
        }

        .logo-icon {
            font-size: 32px;
        }

        .subtitle {
            font-size: 14px;
            color: #8c92ac;
            margin-bottom: 30px;
        }

        /* --- 管理入口按钮 --- */
        .admin-link {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 12px;
            color: #6c63ff;
            text-decoration: none;
            padding: 5px 10px;
            border: 1px solid #6c63ff;
            border-radius: 5px;
            transition: all 0.2s;
        }

        .admin-link:hover {
            background: rgba(108, 99, 255, 0.2);
        }

        /* --- 时间显示区 --- */
        .clock-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .time-display {
            font-size: 48px;
            font-weight: 300;
            color: #6c63ff;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .date-display {
            font-size: 14px;
            color: #8c92ac;
        }

        /* --- 输入区 --- */
        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #b0b0c0;
        }

        .text-input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid #3a3a50;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .text-input::placeholder {
            color: #555;
        }

        .text-input:focus {
            border-color: #6c63ff;
        }

        /* --- 按钮 --- */
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #6c63ff, #4a41d4);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 25px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(108, 99, 255, 0.4);
        }

        /* --- 说明区 --- */
        .info-box {
            background: rgba(30, 30, 60, 0.5);
            border: 1px solid rgba(108, 99, 255, 0.3);
            border-radius: 10px;
            padding: 15px;
            text-align: left;
            margin-top: 20px;
        }

        .info-title {
            color: #6c63ff;
            font-weight: bold;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .shift-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            font-size: 11px;
            color: #ccc;
            margin-bottom: 12px;
        }

        .shift-item {
            background: rgba(108, 99, 255, 0.1);
            padding: 6px 8px;
            border-radius: 4px;
            text-align: center;
            border: 1px solid rgba(108, 99, 255, 0.2);
        }

        .shift-item.night {
            background: rgba(255, 107, 107, 0.15);
            border-color: rgba(255, 107, 107, 0.3);
            color: #ff8a80;
            font-weight: bold;
        }

        .rules-list {
            font-size: 11px;
            color: #8c92ac;
            line-height: 1.8;
            border-top: 1px solid rgba(108, 99, 255, 0.2);
            padding-top: 10px;
            margin-top: 10px;
        }

        .rules-list strong {
            color: #6c63ff;
        }

        .warning-text {
            color: #ff6b6b;
            font-weight: bold;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 管理入口 -->
        <a href="/admin.html" class="admin-link">⚙️ 管理</a>
        
        <!-- 头部 -->
        <div class="logo">
            <span class="logo-icon">📋</span>
            夜聊值班打卡
        </div>
        <div class="subtitle">输入姓名，系统自动匹配值班时段</div>

        <!-- 时间模块 -->
        <div class="clock-section">
            <div class="time-display" id="current-time">00:00:00</div>
            <div class="date-display" id="current-date">2026/06/09 二</div>
        </div>

        <!-- 输入表单 -->
        <form onsubmit="handleSignin(event)">
            <div class="input-group">
                <label class="input-label">请输入您的值班姓名</label>
                <input type="text" id="name" class="text-input" placeholder="例如：领悟" required autocomplete="off">
            </div>

            <button type="submit" class="submit-btn">立即打卡</button>
        </form>

        <!-- 值班时段说明 -->
        <div class="info-box">
            <div class="info-title">📌 值班时段</div>
            <div class="shift-grid" id="shiftGrid">
                <div class="shift-item">04:00-06:00</div>
                <div class="shift-item">06:00-08:00</div>
                <div class="shift-item">08:00-09:30</div>
                <div class="shift-item">09:30-11:00</div>
                <div class="shift-item">11:00-12:30</div>
                <div class="shift-item">12:30-14:00</div>
                <div class="shift-item">14:00-15:30</div>
                <div class="shift-item">15:30-17:00</div>
                <div class="shift-item">17:00-18:30</div>
                <div class="shift-item">18:30-20:00</div>
                <div class="shift-item">20:00-21:30</div>
                <div class="shift-item">21:30-23:00</div>
                <div class="shift-item">23:00-24:00</div>
                <div class="shift-item night">🌙 24:00-04:00 (夜班)</div>
            </div>
            
            <div class="rules-list">
                <strong>⚠️ 打卡规则：</strong><br>
                1. 只有参与值班的人员才能打卡<br>
                2. 必须在本人值班时间段内打卡<br>
                3. 每人每天每个时段限打卡一次
                <div class="warning-text">

                </div>
            </div>
        </div>
    </div>

    <script>
        const defaultShifts = [
            { id: 1, name: '04:00-06:00', startTime: '04:00', endTime: '06:00' },
            { id: 2, name: '06:00-08:00', startTime: '06:00', endTime: '08:00' },
            { id: 3, name: '08:00-09:30', startTime: '08:00', endTime: '09:30' },
            { id: 4, name: '09:30-11:00', startTime: '09:30', endTime: '11:00' },
            { id: 5, name: '11:00-12:30', startTime: '11:00', endTime: '12:30' },
            { id: 6, name: '12:30-14:00', startTime: '12:30', endTime: '14:00' },
            { id: 7, name: '14:00-15:30', startTime: '14:00', endTime: '15:30' },
            { id: 8, name: '15:30-17:00', startTime: '15:30', endTime: '17:00' },
            { id: 9, name: '17:00-18:30', startTime: '17:00', endTime: '18:30' },
            { id: 10, name: '18:30-20:00', startTime: '18:30', endTime: '20:00' },
            { id: 11, name: '20:00-21:30', startTime: '20:00', endTime: '21:30' },
            { id: 12, name: '21:30-23:00', startTime: '21:30', endTime: '23:00' },
            { id: 13, name: '23:00-24:00', startTime: '23:00', endTime: '24:00' },
            { id: 14, name: '24:00-04:00', startTime: '24:00', endTime: '04:00' }
        ];

        // 1. 实时时钟逻辑
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
            const dateStr = now.toLocaleDateString('zh-CN', { 
                year: 'numeric', 
                month: '2-digit', 
                day: '2-digit',
                weekday: 'short'
            }).replace(/\//g, '/');
            
            document.getElementById('current-time').innerText = timeStr;
            document.getElementById('current-date').innerText = dateStr;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. 加载时段配置
        function loadShiftConfig() {
            const shiftConfig = JSON.parse(localStorage.getItem('shiftConfig')) || defaultShifts;
            renderShiftGrid(shiftConfig);
        }

        function renderShiftGrid(shiftConfig) {
            const grid = document.getElementById('shiftGrid');
            grid.innerHTML = shiftConfig.map(shift => {
                const isNight = shift.id === 14;
                return `
                    <div class="shift-item${isNight ? ' night' : ''}">
                        ${isNight ? '🌙 ' : ''}${shift.name}${isNight ? ' (夜班)' : ''}
                    </div>
                `;
            }).join('');
        }

        // 初始化加载配置
        loadShiftConfig();

        // 3. 打卡逻辑
        async function handleSignin(event) {
            event.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const btn = document.querySelector('.submit-btn');
            
            if (!name) {
                alert('请输入姓名！');
                return;
            }

            btn.innerText = '打卡中...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/signin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name, duty_time: '' })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    alert('✅ 打卡成功！\n日期：' + result.date + '\n时间：' + result.time + '\n值班时段：' + result.duty_time);
                    document.getElementById('name').value = '';
                } else if (response.status === 400) {
                    alert('⚠️ ' + result.error);
                } else {
                    alert('❌ ' + result.error);
                }
            } catch (error) {
                console.error('打卡请求失败:', error);
                alert('❌ 网络请求失败，请检查网络连接');
            } finally {
                btn.innerText = '立即打卡';
                btn.disabled = false;
            }
        }
    </script>

</body>
</html>
