<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据库诊断</title>
    <style>
        body {
            background: #1a1a2e;
            color: #fff;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        .result {
            background: #16213e;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            white-space: pre-wrap;
            font-family: monospace;
        }
        h2 { color: #4fc3f7; }
    </style>
</head>
<body>
    <h1>🔍 数据库诊断工具</h1>
    
    <h2>1. 分组分布统计</h2>
    <div id="groupDistribution" class="result">加载中...</div>
    
    <h2>2. 前 10 条数据详情</h2>
    <div id="sampleData" class="result">加载中...</div>
    
    <h2>3. group_id 分布</h2>
    <div id="groupIdDistribution" class="result">加载中...</div>
    
    <script>
        async function loadDiagnostics() {
            try {
                // 获取所有记录
                const response = await fetch('/api/records');
                const records = await response.json();
                
                // 分组分布统计
                const groupCounts = {};
                const groupIdCounts = {};
                
                records.forEach(r => {
                    const groupName = r.group_name || '未分组';
                    const groupId = r.group_id || 'null';
                    
                    groupCounts[groupName] = (groupCounts[groupName] || 0) + 1;
                    groupIdCounts[groupId] = (groupIdCounts[groupId] || 0) + 1;
                });
                
                document.getElementById('groupDistribution').textContent = 
                    `总记录数：${records.length}\n\n分组名称统计:\n` + 
                    Object.entries(groupCounts)
                        .sort((a, b) => b[1] - a[1])
                        .map(([name, count]) => `  ${name}: ${count}条`)
                        .join('\n');
                
                document.getElementById('groupIdDistribution').textContent = 
                    `group_id 值统计:\n` + 
                    Object.entries(groupIdCounts)
                        .sort((a, b) => b[1] - a[1])
                        .map(([id, count]) => `  group_id=${id}: ${count}条`)
                        .join('\n');
                
                // 前 10 条数据详情
                document.getElementById('sampleData').textContent = 
                    records.slice(0, 10).map((r, i) => 
                        `${i+1}. 姓名：${r.name}, group_id: ${r.group_id}, group_name: ${r.group_name || 'null'}, 日期：${r.duty_date}`
                    ).join('\n');
            } catch (error) {
                document.getElementById('groupDistribution').textContent = '错误：' + error.message;
            }
        }
        
        loadDiagnostics();
    </script>
</body>
</html>
