<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>补卡 - 值班打卡系统</title>
    <script src="/utils/date-utils.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: #fff;
            color: #333;
            padding: 12px;
            padding-left: calc(12px + env(safe-area-inset-left));
            padding-right: calc(12px + env(safe-area-inset-right));
            padding-top: calc(12px + env(safe-area-inset-top));
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            min-height: 100dvh;
            overflow-x: hidden;
            word-break: break-word;
            overflow-wrap: break-word;
            -webkit-tap-highlight-color: transparent;
        }
        .container { max-width: 100%; margin: 0 auto; }
        .header-section { text-align: center; margin-bottom: 16px; }
        h1 {
            color: #ff7a1a;
            font-size: clamp(20px, 5vw, 28px);
            font-weight: 700;
            margin-bottom: 16px;
        }

        nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
        }
        .nav-btn {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(90deg, #4a4a4a, #2a2a2a);
            color: #e0e0e0;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
        }

        .stats-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-bottom: 16px;
            padding: 12px 16px;
            background: #f9f9f9;
            border-radius: 4px;
            border: 1px solid #e0e0e0;
        }
        .stat-item { text-align: center; }
        .stat-label { font-size: clamp(11px, 2.5vw, 13px); color: #666; }
        .stat-value { font-size: clamp(14px, 3vw, 16px); font-weight: 700; color: #e65100; }

        .action-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 3px;
            font-size: clamp(12px, 3vw, 14px);
            font-weight: 600;
            cursor: pointer;
            min-height: 44px;
            -webkit-appearance: none;
            appearance: none;
        }
        .btn-primary { background: #0b95c9; color: white; }
        .btn-danger { background: #f44336; color: white; }
        .btn-apply { background: #4CAF50; color: white; padding: 10px 15px; border-radius: 2px; font-size: clamp(12px, 3vw, 13px); }
        .btn-clear { background: #9e9e9e; color: white; padding: 10px 15px; border-radius: 2px; font-size: clamp(12px, 3vw, 13px); }

        .search-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
        }
        .search-input {
            padding: 10px 12px;
            border: 1px solid #dcdfe6;
            border-radius: 2px;
            font-size: clamp(12px, 3vw, 13px);
            width: 100%;
            max-width: 280px;
            min-height: 44px;
            -webkit-appearance: none;
            appearance: none;
        }
        .search-input:focus { outline: none; border-color: #4CAF50; }
        .filter-actions { display: flex; gap: 8px; }

        .table-container {
            border: 1px solid #dcdfe6;
            overflow-x: auto;
            overflow-y: auto;
            max-height: 270px;
            min-height: auto;
            -webkit-overflow-scrolling: touch;
        }
        .makeup-table { border-collapse: collapse; font-size: clamp(11px, 2.5vw, 13px); width: 100%; }
        .makeup-table thead th {
            background: #ff6b00;
            color: #fff;
            font-weight: 600;
            padding: 8px 10px;
            text-align: center;
            border: 1px solid #dcdfe6;
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .makeup-table tbody td {
            padding: 8px 10px;
            text-align: center;
            border: 1px solid #dcdfe6;
            white-space: nowrap;
        }
        .makeup-table tbody tr:hover { background: #fff7e6; }
        .makeup-table .btn-makeup {
            padding: 5px 12px;
            background: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            min-height: 32px;
        }
        .makeup-table .btn-makeup:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .makeup-table .btn-makeup.done {
            background: #bbb;
        }
        .makeup-table td.name-cell { font-weight: 500; }

        .empty-row td { color: #999; padding: 40px; }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 14px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
        .toast.success { background: #4CAF50; }
        .toast.error { background: #f44336; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        @media (min-width: 600px) {
            body { padding: 20px; padding-left: calc(20px + env(safe-area-inset-left)); padding-right: calc(20px + env(safe-area-inset-right)); }
            .search-row { flex-direction: row; }
            .search-input { width: 200px; }
        }

        @media (min-width: 1024px) {
            body {
                min-height: 100dvh;
                overflow-x: hidden;
                display: flex;
                align-items: flex-start;
                padding: 20px 40px;
            }
            .container {
                width: 100%;
                max-width: 1200px;
                padding-bottom: 60px;
            }
            .table-container { max-height: 600px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-section">
            <h1>补卡</h1>
            <nav>
                <a href="/" class="nav-btn">打卡首页</a>
                <a href="/admin.html" class="nav-btn">排班管理</a>
                <a href="/query.html" class="nav-btn">排班查询</a>
                <a href="/export.html" class="nav-btn">导出预览</a>
                <a href="/records.html" class="nav-btn">详细记录</a>
            </nav>
            <div class="stats-bar">
                <div class="stat-item"><span class="stat-label">漏打卡：</span><span class="stat-value" id="missedCount">0</span></div>
                <div class="stat-item"><span class="stat-label">已补卡：</span><span class="stat-value" id="makeupCount" style="color:#4CAF50">0</span></div>
            </div>
            <div class="search-row">
                <input type="text" id="searchInput" class="search-input" placeholder="搜索姓名..." aria-label="搜索姓名">
                <div class="filter-actions">
                    <button id="btnApply" class="btn btn-apply" aria-label="应用筛选">应用</button>
                    <button id="btnClear" class="btn btn-clear" aria-label="清除筛选">清除</button>
                </div>
            </div>
        </div>
        <div class="table-container">
            <table class="makeup-table" id="makeupTable">
                <thead><tr>
                    <th scope="col">日期</th>
                    <th scope="col">时段</th>
                    <th scope="col">姓名</th>
                    <th scope="col">分组</th>
                    <th scope="col">操作</th>
                </tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <h2 style="font-size:18px;color:#4CAF50;text-align:center;margin-top:24px;margin-bottom:12px;">已补卡记录</h2>
        <div class="table-container">
            <table class="makeup-table" id="makeupDoneTable">
                <thead><tr>
                    <th scope="col">日期</th>
                    <th scope="col">时段</th>
                    <th scope="col">姓名</th>
                    <th scope="col">分组</th>
                    <th scope="col">补卡时间</th>
                </tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
(function() {
    let missedData = [], cycleStartDate = null, makeupDone = new Set();

    function init() {
        document.getElementById('btnApply').addEventListener('click', applyFilters);
        document.getElementById('btnClear').addEventListener('click', clearFilters);
        loadSettings();
        loadMakeupRecords();
    }

    function loadSettings() {
        fetch('/api/settings').then(r => r.json()).then(data => {
            cycleStartDate = data.cycleStartDate || DateUtils.formatBeijingDate();
            loadMissed();
        }).catch(() => {
            cycleStartDate = DateUtils.formatBeijingDate();
            loadMissed();
        });
    }

    function formatDate(dateStr) {
        if (!dateStr) return '';
        const parts = dateStr.split('-');
        return parseInt(parts[1]) + '月' + parseInt(parts[2]) + '日';
    }

    function loadMissed() {
        const url = '/api/makeup-missed?start_date=' + encodeURIComponent(cycleStartDate);
        fetch(url).then(r => r.json()).then(data => {
            missedData = (data.success ? data.data : []) || [];
            if (!Array.isArray(missedData)) missedData = [];
            renderTable();
        }).catch(e => {
            console.error('Load missed error:', e);
            renderTable([]);
        });
    }

    function renderTable() {
        const tbody = document.querySelector('#makeupTable tbody');
        const searchVal = document.getElementById('searchInput').value.trim().toLowerCase();

        let filtered = missedData;
        if (searchVal) {
            filtered = missedData.filter(r => r.name && r.name.toLowerCase().includes(searchVal));
        }

        if (filtered.length === 0) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="5">没有漏打卡记录</td></tr>';
        } else {
            tbody.innerHTML = filtered.map((r, i) => {
                const key = r.name + '|' + r.duty_date + '|' + r.duty_time;
                const done = makeupDone.has(key);
                return '<tr data-key="' + key + '">' +
                    '<td>' + r.duty_date + '</td>' +
                    '<td>' + r.duty_time + '</td>' +
                    '<td class="name-cell">' + r.name + '</td>' +
                    '<td>' + (r.group_name || '-') + '</td>' +
                    '<td><button class="btn-makeup' + (done ? ' done' : '') + '" data-name="' + r.name + '" data-date="' + r.duty_date + '" data-time="' + r.duty_time + '" data-group="' + (r.group_id || '') + '"' + (done ? ' disabled' : '') + '>' + (done ? '已补' : '补卡') + '</button></td>' +
                '</tr>';
            }).join('');

            tbody.querySelectorAll('.btn-makeup:not([disabled])').forEach(btn => {
                btn.addEventListener('click', function() {
                    const name = this.dataset.name;
                    const dutyDate = this.dataset.date;
                    const dutyTime = this.dataset.time;
                    const groupId = this.dataset.group;
                    doMakeup(name, dutyDate, dutyTime, groupId, this);
                });
            });
        }

        updateStats();
    }

    function updateStats() {
        const searchVal = document.getElementById('searchInput').value.trim().toLowerCase();
        let visible = missedData;
        if (searchVal) {
            visible = missedData.filter(r => r.name && r.name.toLowerCase().includes(searchVal));
        }
        document.getElementById('missedCount').textContent = visible.length;
        document.getElementById('makeupCount').textContent = makeupDone.size;
    }

    function doMakeup(name, dutyDate, dutyTime, groupId, btn) {
        btn.disabled = true;
        btn.textContent = '...';

        fetch('/api/makeup-signin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name: name,
                duty_date: dutyDate,
                duty_time: dutyTime,
                group_id: groupId || null
            })
        }).then(r => r.json()).then(data => {
            if (data.success) {
                const key = name + '|' + dutyDate + '|' + dutyTime;
                makeupDone.add(key);
                btn.classList.add('done');
                btn.textContent = '已补';
                showToast(name + ' ' + dutyDate + ' ' + dutyTime + ' 补卡成功', 'success');
                loadMakeupRecords();

                missedData = missedData.filter(r => {
                    const rk = r.name + '|' + r.duty_date + '|' + r.duty_time;
                    return rk !== key;
                });
                renderTable();
            } else {
                btn.disabled = false;
                btn.textContent = '补卡';
                showToast(data.error || '补卡失败', 'error');
            }
        }).catch(e => {
            btn.disabled = false;
            btn.textContent = '补卡';
            showToast('网络错误: ' + e.message, 'error');
        });
    }

    function loadMakeupRecords() {
        fetch('/api/records').then(r => r.json()).then(data => {
            const records = (data.success ? data.data : []) || [];
            const makeupRecords = Array.isArray(records)
                ? records.filter(r => r.ip_address === 'makeup')
                    .sort((a, b) => b.created_at.localeCompare(a.created_at))
                : [];
            renderMakeupDoneTable(makeupRecords);
        }).catch(e => {
            console.error('Load makeup records error:', e);
        });
    }

    function renderMakeupDoneTable(records) {
        const tbody = document.querySelector('#makeupDoneTable tbody');
        if (!records || records.length === 0) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="5">暂无补卡记录</td></tr>';
            return;
        }
        tbody.innerHTML = records.map(r => {
            return '<tr>' +
                '<td>' + r.duty_date + '</td>' +
                '<td>' + r.duty_time + '</td>' +
                '<td class="name-cell">' + r.name + '</td>' +
                '<td>' + (r.group_name || '-') + '</td>' +
                '<td style="color:#4CAF50">' + r.created_at + '</td>' +
            '</tr>';
        }).join('');
    }

    function applyFilters() {
        renderTable();
    }

    function clearFilters() {
        document.getElementById('searchInput').value = '';
        renderTable();
    }

    function showToast(msg, type) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = 'toast ' + type + ' show';
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => { toast.className = 'toast'; }, 2000);
    }

    window.addEventListener('DOMContentLoaded', init);
})();
    </script>
</body>
</html>
