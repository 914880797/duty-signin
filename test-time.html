<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时间测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #2a2a40;
        }
        h1 { color: #fff; margin-bottom: 20px; }
        .info-box {
            background: rgba(108, 99, 255, 0.1);
            border: 1px solid rgba(108, 99, 255, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .info-item {
            margin: 10px 0;
            font-size: 16px;
        }
        .info-label {
            color: #8c92ac;
            margin-right: 10px;
        }
        .info-value {
            color: #6c63ff;
            font-weight: bold;
        }
        .btn {
            padding: 12px 25px;
            background: linear-gradient(90deg, #6c63ff, #4a41d4);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }
        .log-box {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            font-size: 13px;
            max-height: 400px;
            overflow: auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🕐 时间计算测试</h1>
        
        <div class="info-box">
            <div class="info-item">
                <span class="info-label">本地时间:</span>
                <span class="info-value" id="localTime"></span>
            </div>
            <div class="info-item">
                <span class="info-label">北京时间:</span>
                <span class="info-value" id="bjTime"></span>
            </div>
            <div class="info-item">
                <span class="info-label">日期:</span>
                <span class="info-value" id="bjDate"></span>
            </div>
            <div class="info-item">
                <span class="info-label">时间:</span>
                <span class="info-value" id="bjTimeOnly"></span>
            </div>
            <div class="info-item">
                <span class="info-label">当前时段:</span>
                <span class="info-value" id="currentShift"></span>
            </div>
        </div>

        <button onclick="refreshTime()" class="btn">🔄 刷新时间</button>
        <button onclick="testApi()" class="btn">🧪 测试 API 时间</button>

        <div id="log" class="log-box">点击按钮查看日志...</div>
    </div>

    <script>
        const shifts = [
            { id: 1, name: '04:00-06:00', startTime: '04:00', endTime: '06:00' },
            { id: 2, name: '06:00-08:00', startTime: '06:00', endTime: '08:00' },
            { id: 3, name: '08:00-09:30', startTime: '08:00', endTime: '09:30' },
            { id: 4, name: '09:30-11:00', startTime: '09:30', endTime: '11:00' },
            { id: 5, name: '11:00-12:30', startTime: '11:00', endTime: '12:30' },
            { id: 6, name: '12:30-14:00', startTime: '12:30', endTime: '14:00' },
            { id: 7, name: '14:00-15:30', startTime: '14:00', endTime: '15:30' },
            { id: 8, name: '15:30-17:00', startTime: '15:30', endTime: '17:00' },
            { id: 9, name: '17:00-18:30', startTime: '17:00', endTime: '18:30' },
            { id: 10, name: '18:30-20:00', startTime: '18:30', endTime: '20:00' },
            { id: 11, name: '20:00-21:30', startTime: '20:00', endTime: '21:30' },
            { id: 12, name: '21:30-23:00', startTime: '21:30', endTime: '23:00' },
            { id: 13, name: '23:00-24:00', startTime: '23:00', endTime: '24:00' },
            { id: 14, name: '24:00-04:00', startTime: '24:00', endTime: '04:00' }
        ];

        function log(msg) {
            const logEl = document.getElementById('log');
            const time = new Date().toLocaleTimeString('zh-CN');
            logEl.textContent += `[${time}] ${msg}\n`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        function getCurrentShift(timeStr) {
            const [hours, minutes] = timeStr.split(':').map(Number);
            const timeInMinutes = hours * 60 + minutes;
            
            // 特殊处理跨天时段 24:00-04:00
            if (timeInMinutes >= 0 && timeInMinutes < 4 * 60) {
                return '24:00-04:00 (夜班🌙)';
            }
            
            for (const shift of shifts) {
                const [startH, startM] = shift.startTime.split(':').map(Number);
                const [endH, endM] = shift.endTime.split(':').map(Number);
                const startMin = startH * 60 + startM;
                let endMin = endH * 60 + endM;
                
                if (shift.endTime === '24:00') endMin = 24 * 60;
                
                if (timeInMinutes >= startMin && timeInMinutes < endMin) {
                    return shift.name + (shift.id === 14 ? ' (夜班🌙)' : '');
                }
            }
            
            return '未匹配到时段';
        }

        function refreshTime() {
            const now = new Date();
            const localTimeStr = now.toLocaleString('zh-CN');
            
            // 使用浏览器时区获取
            const bjTimeStr = now.toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });
            const bjDate = new Date(bjTimeStr);
            
            const pad = (n) => String(n).padStart(2, '0');
            const dateStr = `${bjDate.getFullYear()}-${pad(bjDate.getMonth() + 1)}-${pad(bjDate.getDate())}`;
            const timeStr = `${pad(bjDate.getHours())}:${pad(bjDate.getMinutes())}:${pad(bjDate.getSeconds())}`;
            const timeOnly = `${pad(bjDate.getHours())}:${pad(bjDate.getMinutes())}`;
            
            const currentShift = getCurrentShift(timeOnly);
            
            document.getElementById('localTime').textContent = localTimeStr;
            document.getElementById('bjTime').textContent = bjTimeStr;
            document.getElementById('bjDate').textContent = dateStr;
            document.getElementById('bjTimeOnly').textContent = timeOnly;
            document.getElementById('currentShift').textContent = currentShift;
            
            log('=== 时间刷新 ===');
            log(`本地时间：${localTimeStr}`);
            log(`北京时间：${bjTimeStr}`);
            log(`日期：${dateStr}`);
            log(`时间：${timeOnly}`);
            log(`当前时段：${currentShift}`);
            
            // 检查是否 04:00-06:00
            const [hours] = timeOnly.split(':').map(Number);
            if (hours >= 4 && hours < 6) {
                log('✅ 当前时间在 04:00-06:00 范围内，可以打卡！');
            } else {
                log('⚠️ 当前时间不在 04:00-06:00 范围内');
            }
        }

        async function testApi() {
            log('=== 测试 API 时间计算 ===');
            try {
                const response = await fetch('/api/signin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: 'TEST_DEBUG', duty_time: '' })
                });
                const result = await response.json();
                log('API 响应状态:', response.status);
                log('API 响应:', JSON.stringify(result, null, 2));
            } catch (error) {
                log('API 请求失败:', error.message);
            }
        }

        // 自动刷新
        refreshTime();
        setInterval(refreshTime, 1000);
    </script>
</body>
</html>
