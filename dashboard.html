<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据看板</title>
    <script src="/utils/date-utils.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            font-size: clamp(14px, 2.5vw, 16px);
            padding: 8px;
            overflow-x: hidden;
            min-height: 100dvh;
            padding-left: max(8px, env(safe-area-inset-left));
            padding-right: max(8px, env(safe-area-inset-right));
            word-break: break-word;
            overflow-wrap: break-word;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            color: #fff;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: clamp(18px, 4vw, 24px);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: clamp(8px, 2vw, 10px) clamp(14px, 3vw, 18px);
            border: none;
            border-radius: 8px;
            font-size: clamp(12px, 2.5vw, 14px);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
            -webkit-appearance: none;
        }

        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(90deg, #4a4a4a, #2a2a2a);
            color: #e0e0e0;
            text-decoration: none;
            border-radius: 8px;
            margin: 5px;
            font-size: 14px;
        }
        .back-btn:hover { opacity: 0.8; }

        .nav-links {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 15px;
        }
        .nav-links .back-btn { margin: 0; text-align: center; }

        .btn-primary {
            background: linear-gradient(90deg, #6c63ff, #5a52d5);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(108, 99, 255, 0.4);
        }

        .btn-export {
            background: linear-gradient(90deg, #4caf50, #45a049);
            color: white;
        }

        .btn-export:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }

        .btn-records {
            background: linear-gradient(90deg, #2196f3, #1976d2);
            color: white;
        }

        .btn-records:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(33, 150, 243, 0.4);
        }

        .btn-back {
            background: rgba(108, 99, 255, 0.2);
            color: white;
            border: 1px solid rgba(108, 99, 255, 0.5);
        }

        .btn-back:hover {
            background: rgba(108, 99, 255, 0.4);
        }

        .btn-admin {
            background: linear-gradient(90deg, #ff9800, #f57c00);
            color: white;
        }

        .btn-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 152, 0, 0.4);
        }

        .filter-section {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #2a2a40;
        }

        .filter-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 12px;
        }

        .filter-group {
            flex: 1;
            min-width: 0;
            width: 100%;
        }

        .filter-group label {
            display: block;
            margin-bottom: 6px;
            color: #8c92ac;
            font-size: clamp(12px, 2vw, 14px);
        }

        .filter-group input, .filter-group select {
            width: 100%;
            padding: clamp(8px, 2vw, 10px) 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #3a3a50;
            border-radius: 8px;
            color: #fff;
            font-size: clamp(12px, 2.5vw, 14px);
            -webkit-appearance: none;
            min-height: 44px;
        }

        .filter-group input:focus, .filter-group select:focus {
            outline: none;
            border-color: #6c63ff;
        }

        .btn {
            padding: clamp(10px, 2.5vw, 10px) clamp(14px, 3vw, 20px);
            background: linear-gradient(90deg, #6c63ff, #4a41d4);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: clamp(12px, 2.5vw, 14px);
            margin: 4px;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            background: linear-gradient(90deg, #9e9e9e, #757575);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #2a2a40;
            text-align: center;
        }

        .stat-number {
            font-size: clamp(20px, 5vw, 32px);
            font-weight: bold;
            color: #6c63ff;
            margin-bottom: 4px;
        }

        .stat-label {
            color: #8c92ac;
            font-size: clamp(11px, 2vw, 14px);
        }

        .charts-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .chart-card {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #2a2a40;
        }

        .chart-title {
            color: #fff;
            font-size: clamp(13px, 2.5vw, 16px);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chart-container {
            position: relative;
            max-height: 135px;
            overflow-y: auto;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .bar-item {
            display: flex;
            align-items: center;
            gap: 8px;
            height: 20px;
            flex-shrink: 0;
        }

        .bar-label {
            min-width: 60px;
            font-size: clamp(11px, 2vw, 13px);
            color: #8c92ac;
            text-align: right;
            flex-shrink: 0;
        }

        .bar-track {
            flex: 1;
            background: rgba(108, 99, 255, 0.1);
            border-radius: 4px;
            height: 18px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #6c63ff, #4a41d4);
            border-radius: 4px;
            transition: width 0.3s;
        }

        .bar-value {
            min-width: 32px;
            font-size: clamp(11px, 2vw, 13px);
            color: #fff;
            text-align: right;
            flex-shrink: 0;
        }

        .empty {
            text-align: center;
            padding: 30px 12px;
            color: #8c92ac;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #6c63ff;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4a41d4;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        @media (min-width: 600px) {
            body {
                padding: 16px;
            }

            h1 {
                margin-bottom: 24px;
            }

            .page-header {
                margin-bottom: 24px;
            }

            .filter-section {
                padding: 18px;
                border-radius: 14px;
            }

            .filter-row {
                flex-direction: row;
                flex-wrap: wrap;
            }

            .filter-group {
                min-width: 160px;
            }

            .stats-grid {
                gap: 16px;
                margin-bottom: 20px;
            }

            .stat-card {
                padding: 16px;
                border-radius: 12px;
            }

            .charts-row {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
                margin-bottom: 20px;
            }

            .chart-card {
                padding: 16px;
                border-radius: 12px;
            }
        }

        @media (min-width: 1024px) {
            body {
                min-height: 100dvh;
                overflow-x: hidden;
                display: flex;
                align-items: flex-start;
                padding: 24px 48px;
            }

            .container {
                width: 100%;
                padding: 32px 40px 60px;
                max-width: 1600px;
                display: flex;
                flex-direction: column;
                overflow: visible;
            }

            h1 {
                margin-bottom: 20px;
                font-size: 2.2rem;
            }

            .nav-links {
                display: flex;
                justify-content: center;
                gap: 8px;
                flex-wrap: wrap;
            }
            .nav-links .back-btn { margin: 5px; }

            .page-header {
                margin-bottom: 0;
                flex-shrink: 0;
            }

            .filter-section {
                padding: 24px 28px;
                margin-bottom: 24px;
                flex-shrink: 0;
            }

            .filter-row {
                gap: 20px;
            }

            .filter-group {
                min-width: 200px;
            }

            .filter-group label {
                font-size: 16px;
                margin-bottom: 8px;
            }

            .filter-group input,
            .filter-group select {
                padding: 14px 16px;
                font-size: 16px;
            }

            .btn {
                padding: 14px 32px;
                font-size: 16px;
            }

            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 20px;
                margin-bottom: 24px;
                flex-shrink: 0;
            }

            .stat-card {
                padding: 24px 28px;
            }

            .stat-value {
                font-size: 2.4rem;
            }

            .stat-label {
                font-size: 15px;
            }

            .charts-row {
                flex: 1;
                min-height: 0;
                overflow-y: auto;
                grid-template-columns: repeat(4, 1fr);
                gap: 24px;
                margin-bottom: 0;
            }

            .chart-card {
                padding: 24px 28px;
                min-height: 0;
            }

            .chart-title {
                font-size: 18px;
                margin-bottom: 16px;
            }

            .chart-container {
                max-height: 240px;
                min-height: 100px;
                overflow-y: auto;
            }

            .bar-chart {
                height: auto;
            }

            .bar-item {
                height: 32px;
                gap: 14px;
            }

            .bar-label {
                font-size: 15px;
                min-width: 100px;
            }

            .bar-value {
                font-size: 15px;
                min-width: 40px;
            }

            .bar-track {
                height: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1>📊 看板</h1>
        </div>

        <div class="filter-section">
            <div class="nav-links" style="margin-bottom:15px;">
                <a href="/" class="back-btn">🏠 首页</a>
                <a href="/admin.html" class="back-btn">📅 排班管理</a>
                <a href="/query.html" class="back-btn">🔍 排班查询</a>
                <a href="/records.html" class="back-btn">📋 详细记录</a>
                <a href="/export.html" class="back-btn">📥 导出预览</a>
                <a href="/makeup.html" class="back-btn">🔄 补卡</a>
            </div>
            <div class="filter-row">
                <div class="filter-group">
                    <label for="startDate">开始日期</label>
                    <input type="date" id="startDate">
                </div>
                <div class="filter-group">
                    <label for="endDate">结束日期</label>
                    <input type="date" id="endDate">
                </div>
                <div class="filter-group">
                    <label for="shiftSelect">选择时段</label>
                    <select id="shiftSelect">
                        <option value="">-- 全部时段 --</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="groupSelect">选择分组</label>
                    <select id="groupSelect">
                        <option value="">-- 全部分组 --</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="nameSearch">按姓名搜索</label>
                    <input type="text" id="nameSearch" placeholder="输入姓名">
                </div>
            </div>
            <div style="margin-top:15px;">
                <button onclick="loadData()" class="btn" aria-label="刷新数据">刷新数据</button>
                <button onclick="clearFilters()" class="btn btn-secondary" aria-label="清除所有筛选条件">清除筛选</button>
            </div>
        </div>

        <div class="stats-grid" id="statsGrid" role="region" aria-label="统计数据概览">
        </div>

        <div class="charts-row" role="region" aria-label="数据图表">
            <div class="chart-card">
                <div class="chart-title">按时段分布</div>
                <div class="chart-container">
                    <div class="bar-chart" id="shiftChart" role="img" aria-label="按时段分布条形图"></div>
                </div>
            </div>

            <div class="chart-card">
                <div class="chart-title">按分组分布</div>
                <div class="chart-container">
                    <div class="bar-chart" id="groupChart" role="img" aria-label="按分组分布条形图"></div>
                </div>
            </div>

            <div class="chart-card">
                <div class="chart-title">打卡排行（Top 10）</div>
                <div class="chart-container">
                    <div class="bar-chart" id="personChart" role="img" aria-label="打卡排行前十条形图"></div>
                </div>
            </div>

            <div class="chart-card">
                <div class="chart-title">日期趋势</div>
                <div class="chart-container">
                    <div class="bar-chart" id="dateChart" role="img" aria-label="日期趋势条形图"></div>
                </div>
            </div>
        </div>

    </div>
    <script>
        const defaultShifts = [
            '04:00-06:00', '06:00-08:00', '08:00-09:30', '09:30-11:00',
            '11:00-12:30', '12:30-14:00', '14:00-15:30', '15:30-17:00',
            '17:00-18:30', '18:30-20:00', '20:00-21:30', '21:30-23:00',
            '23:00-24:00', '24:00-04:00'
        ];

        let allGroups = [];
        let allRecords = [];
        let filteredRecords = [];

        // Initialize
        window.addEventListener('DOMContentLoaded', async function() {
            await initDates();
            loadShifts();
            loadGroups();
            loadData();
        });

        // Initialize dates
        async function initDates() {
            const endDate = DateUtils.todayBeijing();
            
            let startDateValue;
            try {
                const res = await fetch('/api/settings');
                const settings = await res.json();
                console.log('Settings:', settings);
                if (settings && settings.cycleStartDate) {
                    console.log('Using cycleStartDate:', settings.cycleStartDate);
                    startDateValue = settings.cycleStartDate;
                } else {
                    console.log('No cycleStartDate, using last 7 days');
                    startDateValue = DateUtils.daysAgoBeijing(7);
                }
            } catch (e) {
                console.error('Failed to get settings:', e);
                startDateValue = DateUtils.daysAgoBeijing(7);
            }
            
            document.getElementById('endDate').value = endDate;
            document.getElementById('startDate').value = startDateValue;
            console.log('Dates initialized:', { startDate: startDateValue, endDate });
        }

        // 加载时段选项
        async function loadShifts() {
            const shiftSelect = document.getElementById('shiftSelect');
            try {
                const res = await fetch('/api/settings');
                const settings = await res.json();
                const validDutyTimes = settings.validDutyTimes || [];
                if (validDutyTimes.length > 0) {
                    const options = validDutyTimes.map(t =>
                        `<option value="${t}">${t}</option>`
                    ).join('');
                    shiftSelect.innerHTML = '<option value="">-- 全部时段 --</option>' + options;
                    return;
                }
            } catch (e) {
                console.error('加载有效时段失败:', e);
            }
            const options = defaultShifts.map(shift => 
                `<option value="${shift}">${shift}</option>`
            ).join('');
            shiftSelect.innerHTML = '<option value="">-- 全部时段 --</option>' + options;
        }

        // 加载分组
        async function loadGroups() {
            try {
                const response = await fetch('/api/groups');
                const data = await response.json();
                if (data.success) {
                    allGroups = data.data || [];
                    const groupSelect = document.getElementById('groupSelect');
                    const options = allGroups.map(g => 
                        `<option value="${g.id}">${g.name}</option>`
                    ).join('');
                    groupSelect.innerHTML = '<option value="">-- 全部分组 --</option>' + options;
                }
            } catch (error) {
                console.error('加载分组失败:', error);
            }
        }

        // 加载数据
        async function loadData() {
            console.log('=== 开始加载数据 ===');
            
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const shift = document.getElementById('shiftSelect').value;
            const groupId = document.getElementById('groupSelect').value;
            const nameSearch = document.getElementById('nameSearch').value.trim();

            console.log('筛选条件:', { startDate, endDate, shift, groupId, nameSearch });

            // 获取打卡记录
            let url = '/api/records';
            const params = new URLSearchParams();
            if (startDate) params.append('start_date', startDate);
            if (endDate) params.append('end_date', endDate);
            if (shift) params.append('duty_time', shift);
            
            url += '?' + params.toString();

            console.log('请求 URL:', url);

            try {
                const response = await fetch(url);
                console.log('响应状态:', response.status);
                
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }
                const responseData = await response.json();
                console.log('API 返回数据:', responseData);
                
                // 统一处理 {success: true, data: [...]} 格式
                allRecords = responseData.success ? (responseData.data || []) : [];
                console.log('数据条数:', allRecords.length);
                
                // 筛选数据
                filteredRecords = allRecords.filter(record => {
                    if (groupId && record.group_id != groupId) return false;
                    if (nameSearch && !record.name.toLowerCase().includes(nameSearch.toLowerCase())) return false;
                    return true;
                });

                console.log('筛选后数据:', filteredRecords);

                renderStats();
                renderCharts();
                
                console.log('=== 数据加载完成 ===');
            } catch (error) {
                console.error('加载数据失败:', error);
                alert('加载数据失败：' + error.message);
            }
        }

        // 渲染统计卡片
        function renderStats() {
            const totalRecords = filteredRecords.length;
            const uniquePersons = new Set(filteredRecords.map(r => r.name)).size;
            const today = DateUtils.todayBeijing();
            // 使用 created_at 转换为北京时间后比较
            const todayCount = filteredRecords.filter(r => {
                if (!r.created_at) return false;
                const date = new Date(r.created_at);
                const bjDateStr = DateUtils.formatBeijingDate(date);
                return bjDateStr === today;
            }).length;
            const groupsCount = new Set(filteredRecords.map(r => r.group_id || 'none')).size;

            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${totalRecords}</div>
                    <div class="stat-label">总打卡次数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${uniquePersons}</div>
                    <div class="stat-label">值班人数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${todayCount}</div>
                    <div class="stat-label">今日打卡</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${groupsCount}</div>
                    <div class="stat-label">分组数量</div>
                </div>
            `;
        }

        // 渲染图表
        function renderCharts() {
            renderShiftChart();
            renderGroupChart();
            renderPersonChart();
            renderDateChart();
        }

        // 按时段分布图表
        function renderShiftChart() {
            const shiftCounts = {};
            filteredRecords.forEach(r => {
                shiftCounts[r.duty_time] = (shiftCounts[r.duty_time] || 0) + 1;
            });

            const maxCount = Math.max(...Object.values(shiftCounts), 1);
            const chartEl = document.getElementById('shiftChart');
            
            chartEl.innerHTML = Object.entries(shiftCounts)
                .sort((a, b) => a[0].localeCompare(b[0]))
                .map(([shift, count]) => `
                    <div class="bar-item">
                        <div class="bar-label">${shift}</div>
                        <div class="bar-track">
                            <div class="bar-fill" style="width: ${(count / maxCount) * 100}%"></div>
                        </div>
                        <div class="bar-value">${count}</div>
                    </div>
                `).join('');
        }

        // 按分组分布图表
        function renderGroupChart() {
            const groupCounts = {};
            console.log('=== 分组图表调试 ===');
            console.log('原始数据条数:', filteredRecords.length);
            
            filteredRecords.forEach((r, index) => {
                console.log(`记录${index}:`, {
                    name: r.name,
                    group_id: r.group_id,
                    group_name: r.group_name,
                    duty_time: r.duty_time
                });
                
                const groupName = r.group_name || '未分组';
                groupCounts[groupName] = (groupCounts[groupName] || 0) + 1;
            });
            
            console.log('分组统计结果:', groupCounts);

            const maxCount = Math.max(...Object.values(groupCounts), 1);
            const chartEl = document.getElementById('groupChart');
            
            chartEl.innerHTML = Object.entries(groupCounts)
                .sort((a, b) => b[1] - a[1])
                .map(([group, count]) => `
                    <div class="bar-item">
                        <div class="bar-label">${group}</div>
                        <div class="bar-track">
                            <div class="bar-fill" style="width: ${(count / maxCount) * 100}%"></div>
                        </div>
                        <div class="bar-value">${count}</div>
                    </div>
                `).join('');
        }

        // 人员排行图表
        function renderPersonChart() {
            const personCounts = {};
            filteredRecords.forEach(r => {
                personCounts[r.name] = (personCounts[r.name] || 0) + 1;
            });

            const top10 = Object.entries(personCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10);

            const maxCount = Math.max(...top10.map(([, count]) => count), 1);
            const chartEl = document.getElementById('personChart');
            
            chartEl.innerHTML = top10.map(([name, count]) => `
                <div class="bar-item">
                    <div class="bar-label">${name}</div>
                    <div class="bar-track">
                        <div class="bar-fill" style="width: ${(count / maxCount) * 100}%"></div>
                    </div>
                    <div class="bar-value">${count}</div>
                </div>
            `).join('');
        }

        // 日期趋势图表
        function renderDateChart() {
            const dateCounts = {};
            filteredRecords.forEach(r => {
                const displayDate = DateUtils.getNaturalDate(r.created_at, r.duty_time);
                dateCounts[displayDate] = (dateCounts[displayDate] || 0) + 1;
            });

            const sortedDates = Object.entries(dateCounts).sort((a, b) => a[0].localeCompare(b[0]));
            const maxCount = Math.max(...sortedDates.map(([, count]) => count), 1);
            const chartEl = document.getElementById('dateChart');
            
            chartEl.innerHTML = sortedDates.map(([date, count]) => `
                <div class="bar-item">
                    <div class="bar-label">${date.slice(5)}</div>
                    <div class="bar-track">
                        <div class="bar-fill" style="width: ${(count / maxCount) * 100}%"></div>
                    </div>
                    <div class="bar-value">${count}</div>
                </div>
            `).join('');
        }

        // 清除筛选
        async function clearFilters() {
            await initDates();
            document.getElementById('shiftSelect').value = '';
            document.getElementById('groupSelect').value = '';
            document.getElementById('nameSearch').value = '';
            loadData();
        }
    </script>
</body>
</html>
