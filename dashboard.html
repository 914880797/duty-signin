<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打卡数据看板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            color: #fff;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 筛选区域 */
        .filter-section {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #2a2a40;
        }

        .filter-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .filter-group {
            flex: 1;
            min-width: 180px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 8px;
            color: #8c92ac;
            font-size: 14px;
        }

        .filter-group input, .filter-group select {
            width: 100%;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #3a3a50;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }

        .filter-group input:focus, .filter-group select:focus {
            outline: none;
            border-color: #6c63ff;
        }

        .btn {
            padding: 10px 20px;
            background: linear-gradient(90deg, #6c63ff, #4a41d4);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            background: linear-gradient(90deg, #9e9e9e, #757575);
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2a2a40;
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #6c63ff;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #8c92ac;
            font-size: 14px;
        }

        /* 图表区域 */
        .charts-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        @media (max-width: 1200px) {
            .charts-row {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .charts-row {
                grid-template-columns: 1fr;
            }
        }

        .chart-card {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2a2a40;
        }

        .chart-title {
            color: #fff;
            font-size: 16px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-container {
            position: relative;
            height: 200px;
        }

        /* 简易条形图 */
        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 250px;
            overflow-y: auto;
        }

        .bar-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bar-label {
            min-width: 100px;
            font-size: 13px;
            color: #8c92ac;
            text-align: right;
        }

        .bar-track {
            flex: 1;
            background: rgba(108, 99, 255, 0.1);
            border-radius: 4px;
            height: 20px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #6c63ff, #4a41d4);
            border-radius: 4px;
            transition: width 0.3s;
        }

        .bar-value {
            min-width: 40px;
            font-size: 13px;
            color: #fff;
            text-align: right;
        }

        /* 数据表格 */
        .data-section {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2a2a40;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .section-title {
            color: #fff;
            font-size: 16px;
        }

        .table-container {
            max-height: 500px;
            overflow-y: auto;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(108, 99, 255, 0.2);
            color: #6c63ff;
            padding: 12px 15px;
            text-align: left;
            font-size: 13px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #2a2a40;
            font-size: 14px;
        }

        tr:hover {
            background: rgba(108, 99, 255, 0.1);
        }

        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            background: rgba(108, 99, 255, 0.2);
            color: #6c63ff;
        }

        .tag.group {
            background: rgba(76, 175, 80, 0.2);
            color: #81c784;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #8c92ac;
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: linear-gradient(90deg, #9e9e9e, #757575);
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #6c63ff;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4a41d4;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 打卡数据看板</h1>

        <!-- 筛选区域 -->
        <div class="filter-section">
            <div class="filter-row">
                <div class="filter-group">
                    <label>开始日期</label>
                    <input type="date" id="startDate">
                </div>
                <div class="filter-group">
                    <label>结束日期</label>
                    <input type="date" id="endDate">
                </div>
                <div class="filter-group">
                    <label>选择时段</label>
                    <select id="shiftSelect">
                        <option value="">-- 全部时段 --</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>选择分组</label>
                    <select id="groupSelect">
                        <option value="">-- 全部分组 --</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>按姓名搜索</label>
                    <input type="text" id="nameSearch" placeholder="输入姓名">
                </div>
            </div>
            <div>
                <button onclick="loadData()" class="btn">🔄 刷新数据</button>
                <button onclick="clearFilters()" class="btn btn-secondary">清除筛选</button>
                <button onclick="exportData()" class="btn" style="background: linear-gradient(90deg, #4caf50, #45a049);">📥 导出数据</button>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-grid" id="statsGrid">
            <!-- 动态生成 -->
        </div>

        <!-- 图表区域 -->
        <div class="charts-row">
            <!-- 按时段分布 -->
            <div class="chart-card">
                <div class="chart-title">📈 按时段分布</div>
                <div class="chart-container">
                    <div class="bar-chart" id="shiftChart"></div>
                </div>
            </div>

            <!-- 按分组分布 -->
            <div class="chart-card">
                <div class="chart-title">👥 按分组分布</div>
                <div class="chart-container">
                    <div class="bar-chart" id="groupChart"></div>
                </div>
            </div>

            <!-- 按人员排行 -->
            <div class="chart-card">
                <div class="chart-title">🏆 打卡排行（Top 10）</div>
                <div class="chart-container">
                    <div class="bar-chart" id="personChart"></div>
                </div>
            </div>

            <!-- 日期趋势 -->
            <div class="chart-card">
                <div class="chart-title">📅 日期趋势</div>
                <div class="chart-container">
                    <div class="bar-chart" id="dateChart"></div>
                </div>
            </div>
        </div>

        <!-- 详细数据表格 -->
        <div class="data-section">
            <div class="section-header">
                <div class="section-title">📋 详细打卡记录</div>
                <div style="color: #8c92ac; font-size: 14px;">共 <span id="recordCount" style="color: #6c63ff;">0</span> 条记录</div>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>姓名</th>
                            <th>值班日期</th>
                            <th>值班时段</th>
                            <th>分组</th>
                            <th>打卡时间</th>
                            <th>IP 地址</th>
                        </tr>
                    </thead>
                    <tbody id="recordsTable">
                        <tr><td colspan="6" class="empty">暂无数据</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <a href="/" class="back-btn">← 返回首页</a>
        <a href="/admin.html" class="back-btn">排班管理</a>
    </div>

    <script>
        const defaultShifts = [
            '04:00-06:00', '06:00-08:00', '08:00-09:30', '09:30-11:00',
            '11:00-12:30', '12:30-14:00', '14:00-15:30', '15:30-17:00',
            '17:00-18:30', '18:30-20:00', '20:00-21:30', '21:30-23:00',
            '23:00-24:00', '24:00-04:00'
        ];

        let allGroups = [];
        let allRecords = [];
        let filteredRecords = [];

        // 初始化
        window.addEventListener('DOMContentLoaded', function() {
            initDates();
            loadShifts();
            loadGroups();
            loadData();
        });

        // 初始化日期
        function initDates() {
            const now = new Date();
            const endDate = getBeijingDate(now);
            const startDate = new Date();
            startDate.setDate(now.getDate() - 7); // 默认显示近 7 天

            document.getElementById('endDate').value = endDate;
            document.getElementById('startDate').value = getBeijingDate(startDate);
        }

        // 获取北京日期字符串
        function getBeijingDate(date) {
            const bjTimestamp = date.getTime() + (8 * 60 * 60 * 1000);
            const bjDate = new Date(bjTimestamp);
            const pad = (n) => String(n).padStart(2, '0');
            return `${bjDate.getUTCFullYear()}-${pad(bjDate.getUTCMonth() + 1)}-${pad(bjDate.getUTCDate())}`;
        }

        // 加载时段选项
        function loadShifts() {
            const shiftSelect = document.getElementById('shiftSelect');
            const options = defaultShifts.map(shift => 
                `<option value="${shift}">${shift}</option>`
            ).join('');
            shiftSelect.innerHTML = '<option value="">-- 全部时段 --</option>' + options;
        }

        // 加载分组
        async function loadGroups() {
            try {
                const response = await fetch('/api/groups');
                const data = await response.json();
                if (data.success) {
                    allGroups = data.data || [];
                    const groupSelect = document.getElementById('groupSelect');
                    const options = allGroups.map(g => 
                        `<option value="${g.id}">${g.name}</option>`
                    ).join('');
                    groupSelect.innerHTML = '<option value="">-- 全部分组 --</option>' + options;
                }
            } catch (error) {
                console.error('加载分组失败:', error);
            }
        }

        // 加载数据
        async function loadData() {
            console.log('=== 开始加载数据 ===');
            
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const shift = document.getElementById('shiftSelect').value;
            const groupId = document.getElementById('groupSelect').value;
            const nameSearch = document.getElementById('nameSearch').value.trim();

            console.log('筛选条件:', { startDate, endDate, shift, groupId, nameSearch });

            // 获取打卡记录
            let url = '/api/records';
            const params = new URLSearchParams();
            if (startDate) params.append('start_date', startDate);
            if (endDate) params.append('end_date', endDate);
            if (shift) params.append('duty_time', shift);
            
            url += '?' + params.toString();

            console.log('请求 URL:', url);

            try {
                const response = await fetch(url);
                console.log('响应状态:', response.status);
                
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }
                allRecords = await response.json();
                console.log('API 返回数据:', allRecords);
                console.log('数据条数:', allRecords.length);
                
                // 确保是数组
                if (!Array.isArray(allRecords)) {
                    console.error('API 返回的不是数组:', typeof allRecords);
                    allRecords = [];
                }
                
                // 筛选数据
                filteredRecords = allRecords.filter(record => {
                    if (groupId && record.group_id != groupId) return false;
                    if (nameSearch && !record.name.toLowerCase().includes(nameSearch.toLowerCase())) return false;
                    return true;
                });

                console.log('筛选后数据:', filteredRecords);

                renderStats();
                renderCharts();
                renderTable();
                
                console.log('=== 数据加载完成 ===');
            } catch (error) {
                console.error('加载数据失败:', error);
                alert('加载数据失败：' + error.message);
            }
        }

        // 渲染统计卡片
        function renderStats() {
            const totalRecords = filteredRecords.length;
            const uniquePersons = new Set(filteredRecords.map(r => r.name)).size;
            const today = getBeijingDate(new Date());
            const todayCount = filteredRecords.filter(r => r.duty_date === today).length;
            const groupsCount = new Set(filteredRecords.map(r => r.group_id || 'none')).size;

            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${totalRecords}</div>
                    <div class="stat-label">总打卡次数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${uniquePersons}</div>
                    <div class="stat-label">值班人数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${todayCount}</div>
                    <div class="stat-label">今日打卡</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${groupsCount}</div>
                    <div class="stat-label">分组数量</div>
                </div>
            `;
        }

        // 渲染图表
        function renderCharts() {
            renderShiftChart();
            renderGroupChart();
            renderPersonChart();
            renderDateChart();
        }

        // 按时段分布图表
        function renderShiftChart() {
            const shiftCounts = {};
            filteredRecords.forEach(r => {
                shiftCounts[r.duty_time] = (shiftCounts[r.duty_time] || 0) + 1;
            });

            const maxCount = Math.max(...Object.values(shiftCounts), 1);
            const chartEl = document.getElementById('shiftChart');
            
            chartEl.innerHTML = Object.entries(shiftCounts)
                .sort((a, b) => a[0].localeCompare(b[0]))
                .map(([shift, count]) => `
                    <div class="bar-item">
                        <div class="bar-label">${shift}</div>
                        <div class="bar-track">
                            <div class="bar-fill" style="width: ${(count / maxCount) * 100}%"></div>
                        </div>
                        <div class="bar-value">${count}</div>
                    </div>
                `).join('');
        }

        // 按分组分布图表
        function renderGroupChart() {
            const groupCounts = {};
            console.log('=== 分组图表调试 ===');
            console.log('原始数据条数:', filteredRecords.length);
            
            filteredRecords.forEach((r, index) => {
                console.log(`记录${index}:`, {
                    name: r.name,
                    group_id: r.group_id,
                    group_name: r.group_name,
                    duty_time: r.duty_time
                });
                
                const groupName = r.group_name || '未分组';
                groupCounts[groupName] = (groupCounts[groupName] || 0) + 1;
            });
            
            console.log('分组统计结果:', groupCounts);

            const maxCount = Math.max(...Object.values(groupCounts), 1);
            const chartEl = document.getElementById('groupChart');
            
            chartEl.innerHTML = Object.entries(groupCounts)
                .sort((a, b) => b[1] - a[1])
                .map(([group, count]) => `
                    <div class="bar-item">
                        <div class="bar-label">${group}</div>
                        <div class="bar-track">
                            <div class="bar-fill" style="width: ${(count / maxCount) * 100}%"></div>
                        </div>
                        <div class="bar-value">${count}</div>
                    </div>
                `).join('');
        }

        // 人员排行图表
        function renderPersonChart() {
            const personCounts = {};
            filteredRecords.forEach(r => {
                personCounts[r.name] = (personCounts[r.name] || 0) + 1;
            });

            const top10 = Object.entries(personCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10);

            const maxCount = Math.max(...top10.map(([, count]) => count), 1);
            const chartEl = document.getElementById('personChart');
            
            chartEl.innerHTML = top10.map(([name, count]) => `
                <div class="bar-item">
                    <div class="bar-label">${name}</div>
                    <div class="bar-track">
                        <div class="bar-fill" style="width: ${(count / maxCount) * 100}%"></div>
                    </div>
                    <div class="bar-value">${count}</div>
                </div>
            `).join('');
        }

        // 日期趋势图表
        function renderDateChart() {
            const dateCounts = {};
            filteredRecords.forEach(r => {
                dateCounts[r.duty_date] = (dateCounts[r.duty_date] || 0) + 1;
            });

            const sortedDates = Object.entries(dateCounts).sort((a, b) => a[0].localeCompare(b[0]));
            const maxCount = Math.max(...sortedDates.map(([, count]) => count), 1);
            const chartEl = document.getElementById('dateChart');
            
            chartEl.innerHTML = sortedDates.map(([date, count]) => `
                <div class="bar-item">
                    <div class="bar-label">${date.slice(5)}</div>
                    <div class="bar-track">
                        <div class="bar-fill" style="width: ${(count / maxCount) * 100}%"></div>
                    </div>
                    <div class="bar-value">${count}</div>
                </div>
            `).join('');
        }

        // 渲染表格
        function renderTable() {
            const tbody = document.getElementById('recordsTable');
            document.getElementById('recordCount').innerText = filteredRecords.length;

            if (filteredRecords.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty">暂无数据</td></tr>';
                return;
            }

            // 按打卡时间倒序
            const sorted = [...filteredRecords].sort((a, b) => 
                (b.created_at || '').localeCompare(a.created_at || '')
            );

            tbody.innerHTML = sorted.map(record => `
                <tr>
                    <td>${record.name}</td>
                    <td>${record.duty_date || '-'}</td>
                    <td>${record.duty_time || '-'}</td>
                    <td>${record.group_name ? `<span class="tag group">${record.group_name}</span>` : '<span class="tag">未分组</span>'}</td>
                    <td>${record.created_at || '-'}</td>
                    <td style="font-family: monospace; font-size: 12px;">${record.ip_address || '-'}</td>
                </tr>
            `).join('');
        }

        // 清除筛选
        function clearFilters() {
            initDates();
            document.getElementById('shiftSelect').value = '';
            document.getElementById('groupSelect').value = '';
            document.getElementById('nameSearch').value = '';
            loadData();
        }

        // 导出数据
        function exportData() {
            if (filteredRecords.length === 0) {
                alert('暂无数据可导出');
                return;
            }

            const headers = ['姓名', '值班日期', '值班时段', '分组', '打卡时间', 'IP 地址'];
            const rows = filteredRecords.map(r => [
                r.name,
                r.duty_date || '',
                r.duty_time || '',
                r.group_name || '未分组',
                r.created_at || '',
                r.ip_address || ''
            ]);

            const csv = [
                headers.join(','),
                ...rows.map(row => row.map(cell => `"${cell}"`).join(','))
            ].join('\n');

            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `打卡数据_${getBeijingDate(new Date())}.csv`;
            link.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
