<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据看板</title>
    <script src="/utils/date-utils.js"></script>
    <script src="/utils/frontend-utils.js"></script>
    <link rel="stylesheet" href="/styles/shared.css">
    <script>window.SENTRY_DSN=window.SENTRY_DSN||'';window.SENTRY_ENV=window.SENTRY_ENV||'production';</script>
    <script src="/utils/sentry.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            font-size: clamp(14px, 2.5vw, 16px);
            padding: 8px;
            padding-left: max(8px, env(safe-area-inset-left));
            padding-right: max(8px, env(safe-area-inset-right));
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            color: #fff;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: clamp(18px, 4vw, 24px);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: clamp(8px, 2vw, 10px) clamp(14px, 3vw, 18px);
            font-size: clamp(12px, 2.5vw, 14px);
            transition: all 0.3s;
            line-height: 1.2;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(108, 99, 255, 0.4);
        }

        .btn-export:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }

        .btn-records {
            background: linear-gradient(90deg, #2196f3, #1976d2);
            color: white;
        }

        .btn-records:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(33, 150, 243, 0.4);
        }

        .btn-admin {
            background: linear-gradient(90deg, #ff9800, #f57c00);
            color: white;
        }

        .btn-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 152, 0, 0.4);
        }

        .filter-group {
            width: 100%;
        }

        .btn {
            padding: clamp(10px, 2.5vw, 10px) clamp(14px, 3vw, 20px);
            background: linear-gradient(90deg, #6c63ff, #4a41d4);
            color: white;
            font-size: clamp(12px, 2.5vw, 14px);
            margin: 4px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #2a2a40;
            text-align: center;
        }

        .stat-number {
            font-size: clamp(20px, 5vw, 32px);
            font-weight: bold;
            color: #6c63ff;
            margin-bottom: 4px;
        }

        .stat-label {
            color: #8c92ac;
            font-size: clamp(11px, 2vw, 14px);
        }

        .charts-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .chart-card {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #2a2a40;
        }

        .chart-title {
            color: #fff;
            font-size: clamp(13px, 2.5vw, 16px);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chart-container {
            position: relative;
            max-height: 135px;
            overflow-y: auto;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .bar-item {
            display: flex;
            align-items: center;
            gap: 8px;
            height: 20px;
            flex-shrink: 0;
        }

        .bar-label {
            min-width: 60px;
            font-size: clamp(11px, 2vw, 13px);
            color: #8c92ac;
            text-align: right;
            flex-shrink: 0;
        }

        .bar-track {
            flex: 1;
            background: rgba(108, 99, 255, 0.1);
            border-radius: 4px;
            height: 18px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #6c63ff, #4a41d4);
            border-radius: 4px;
            transition: width 0.3s;
        }

        .bar-value {
            min-width: 32px;
            font-size: clamp(11px, 2vw, 13px);
            color: #fff;
            text-align: right;
            flex-shrink: 0;
        }

        @media (min-width: 600px) {
            h1 {
                margin-bottom: 24px;
            }

            .page-header {
                margin-bottom: 24px;
            }

            .filter-section {
                padding: 18px;
                border-radius: 14px;
            }

            .stats-grid {
                gap: 16px;
                margin-bottom: 20px;
            }

            .stat-card {
                padding: 16px;
                border-radius: 12px;
            }

            .charts-row {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
                margin-bottom: 20px;
            }

            .chart-card {
                padding: 16px;
                border-radius: 12px;
            }
        }

        @media (min-width: 1024px) {
            body {
                padding: 24px 48px;
            }

            .container {
                padding: 32px 40px 60px;
                max-width: 1600px;
            }

            h1 {
                margin-bottom: 20px;
                font-size: 2.2rem;
            }

            .page-header {
                margin-bottom: 0;
                flex-shrink: 0;
            }

            .filter-section {
                padding: 24px 28px;
                margin-bottom: 24px;
                flex-shrink: 0;
            }

            .filter-row {
                gap: 20px;
            }

            .filter-group {
                min-width: 200px;
            }

            .filter-group label {
                font-size: 16px;
                margin-bottom: 8px;
            }

            .filter-group input,
            .filter-group select {
                padding: 14px 16px;
                font-size: 16px;
            }

            .btn {
                padding: 14px 32px;
                font-size: 16px;
            }

            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 20px;
                margin-bottom: 24px;
                flex-shrink: 0;
            }

            .stat-card {
                padding: 24px 28px;
            }

            .stat-value {
                font-size: 2.4rem;
            }

            .stat-label {
                font-size: 15px;
            }

            .charts-row {
                flex: 1;
                min-height: 0;
                overflow-y: auto;
                grid-template-columns: repeat(4, 1fr);
                gap: 24px;
                margin-bottom: 0;
            }

            .chart-card {
                padding: 24px 28px;
                min-height: 0;
            }

            .chart-title {
                font-size: 18px;
                margin-bottom: 16px;
            }

            .chart-container {
                max-height: 240px;
                min-height: 100px;
                overflow-y: auto;
            }

            .bar-chart {
                height: auto;
            }

            .bar-item {
                height: 32px;
                gap: 14px;
            }

            .bar-label {
                font-size: 15px;
                min-width: 100px;
            }

            .bar-value {
                font-size: 15px;
                min-width: 40px;
            }

            .bar-track {
                height: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1>📊 看板</h1>
        </div>

        <div class="filter-section">
            <div class="nav-links" style="margin-bottom:15px;">
                <a href="/" class="back-btn">🏠 首页</a>
                <a href="/admin.html" class="back-btn">📅 排班管理</a>
                <a href="/query.html" class="back-btn">🔍 排班查询</a>
                <a href="/records.html" class="back-btn">📋 详细记录</a>
                <a href="/export.html" class="back-btn">📥 导出预览</a>
                <a href="/makeup.html" class="back-btn">🔄 补卡</a>
            </div>
            <div class="filter-row">
                <div class="filter-group">
                    <label for="startDate">开始日期</label>
                    <input type="date" id="startDate">
                </div>
                <div class="filter-group">
                    <label for="endDate">结束日期</label>
                    <input type="date" id="endDate">
                </div>
                <div class="filter-group">
                    <label for="shiftSelect">选择时段</label>
                    <select id="shiftSelect">
                        <option value="">-- 全部时段 --</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="groupSelect">选择分组</label>
                    <select id="groupSelect">
                        <option value="">-- 全部分组 --</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="nameSearch">按姓名搜索</label>
                    <input type="text" id="nameSearch" placeholder="输入姓名">
                </div>
            </div>
            <div style="margin-top:15px;">
                <button onclick="loadData()" class="btn" aria-label="刷新数据">刷新数据</button>
                <button onclick="clearFilters()" class="btn btn-secondary" aria-label="清除所有筛选条件">清除筛选</button>
            </div>
        </div>

        <div class="stats-grid" id="statsGrid" role="region" aria-label="统计数据概览">
        </div>

        <div class="charts-row" role="region" aria-label="数据图表">
            <div class="chart-card">
                <div class="chart-title">按时段分布</div>
                <div class="chart-container">
                    <div class="bar-chart" id="shiftChart" role="img" aria-label="按时段分布条形图"></div>
                </div>
            </div>

            <div class="chart-card">
                <div class="chart-title">按分组分布</div>
                <div class="chart-container">
                    <div class="bar-chart" id="groupChart" role="img" aria-label="按分组分布条形图"></div>
                </div>
            </div>

            <div class="chart-card">
                <div class="chart-title">打卡排行（Top 10）</div>
                <div class="chart-container">
                    <div class="bar-chart" id="personChart" role="img" aria-label="打卡排行前十条形图"></div>
                </div>
            </div>

            <div class="chart-card">
                <div class="chart-title">日期趋势</div>
                <div class="chart-container">
                    <div class="bar-chart" id="dateChart" role="img" aria-label="日期趋势条形图"></div>
                </div>
            </div>
        </div>

    </div>
    <script src="/scripts/dashboard.js"></script>
</body>
</html>
